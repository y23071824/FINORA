<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>複利試算器｜FINORA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../style.css" />
  <style>
    body {
      max-width: 600px;
      margin: 0 auto;
      padding: 2rem;
      background: #fffaf8;
      font-family: sans-serif;
    }
    h1 {
      text-align: center;
      color: #c96374;
    }
    label {
      display: block;
      margin: 1rem 0 0.3rem;
    }
    input {
      width: 100%;
      padding: 0.5rem;
      font-size: 1rem;
    }
    button {
      margin-top: 1.5rem;
      width: 100%;
      padding: 0.8rem;
      background-color: #c96374;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
    }
    #result {
      margin-top: 2rem;
      font-size: 1.2rem;
      color: #444;
      text-align: center;
    }
    a {
      display: block;
      text-align: center;
      margin-top: 2rem;
      color: #c96374;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <h1>複利試算器（含定期定額）</h1>
  <label>初始本金（元）：<input type="number" id="principal" /></label>
  <label>年利率（％）：<input type="number" id="rate" step="0.01" /></label>
  <label>投資年數：<input type="number" id="years" /></label>
  <label>每年定期投入金額（元）：<input type="number" id="annual" /></label>
  <button onclick="calculateCompound()">開始計算</button>

  <div id="result"></div>
  <a href="../index.html">← 返回首頁</a>

  <script>
    function calculateCompound() {
      const principal = parseFloat(document.getElementById("principal").value) || 0;
      const rate = parseFloat(document.getElementById("rate").value) || 0;
      const years = parseInt(document.getElementById("years").value) || 0;
      const annual = parseFloat(document.getElementById("annual").value) || 0;

      if (years <= 0 || rate < 0) {
        document.getElementById("result").textContent = "請輸入正確數值";
        return;
      }

      let total = principal;
      for (let i = 1; i <= years; i++) {
        total = total * (1 + rate / 100) + annual;
      }

      document.getElementById("result").textContent =
        `累積資產：約 NT$ ${total.toLocaleString(undefined, { maximumFractionDigits: 0 })}`;
    }
  </script>
</body>
</html>
