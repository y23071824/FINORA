<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>複利試算｜FINORA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../style.css" />

  <!-- ✅ Firebase SDK v8 -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

  <!-- ✅ FINORA Firebase 模組 -->
  <script src="../firebase-sync.js"></script>
</head>
<body>
  <h1>複利成長試算</h1>

  <div id="total-assets">💰 資產加總讀取中...</div>
  <div id="asset-list" style="margin-top: 1rem;"></div>

  <label>初始投入金額（元）：
    <input type="number" id="principal" />
  </label>
  <label>年報酬率（%）：
    <input type="number" id="rate" />
  </label>
  <label>投資年數：
    <input type="number" id="years" />
  </label>
  <label>每年定期投入金額：
    <input type="number" id="annual" />
  </label>
  <label>每月定期投入金額：
    <input type="number" id="monthly" />
  </label>
  <button onclick="calculateCompound()">計算複利</button>

  <div id="result" style="margin-top: 1rem; font-weight: bold;"></div>

  <hr />
  <h2>💱 匯率換算</h2>
  <label>金額：
    <input type="number" id="fx-amount" />
  </label>
  <label>從：
    <select id="fx-from">
      <option>USD</option>
      <option>TWD</option>
      <option>JPY</option>
      <option>EUR</option>
    </select>
  </label>
  <label>轉換為：
    <select id="fx-to">
      <option>TWD</option>
      <option>USD</option>
      <option>JPY</option>
      <option>EUR</option>
    </select>
  </label>
  <button onclick="convertFx()">換算</button>
  <div id="fx-result" style="margin-top: 0.5rem;"></div>
  <div id="exchange-rates" style="margin-top: 1rem;"></div>

 <script>
  let exchangeRates = {};

  async function fetchExchangeRates() {
    try {
      const res = await fetch("https://api.exchangerate.host/latest?base=USD&symbols=TWD,JPY,EUR");
      const data = await res.json();
      exchangeRates = data.rates;
      exchangeRates["USD"] = 1;
    } catch (e) {
      console.warn("匯率查詢失敗，改用本地資料");
      exchangeRates = { USD: 1, TWD: 30, JPY: 150, EUR: 0.9 };
    }

    const container = document.getElementById("exchange-rates");
    if (container) {
      container.innerHTML = Object.entries(exchangeRates)
        .map(([currency, rate]) => `<div>1 USD = ${rate} ${currency}</div>`)
        .join("");
    }
  }

  async function loadAssetSummary() {
    if (!exchangeRates["TWD"]) {
      document.getElementById("total-assets").textContent = "⚠️ 匯率尚未就緒，無法顯示資產";
      return;
    }

    const selectedAccount = localStorage.getItem("selectedAccount") || "default";
    let assets = [];
    try {
      assets = await FINORA_AUTH.fetchUserAssets();
    } catch (e) {
      const key = `assets_${selectedAccount}`;
      assets = JSON.parse(localStorage.getItem(key) || "[]");
    }

    const summary = {};
    for (const item of assets) {
      const type = item.type || "未分類";
      const currency = item.currency || "TWD";
      const units = parseFloat(item.units) || 0;
      const price = parseFloat(item.price) || 0;
      const cost = parseFloat(item.cost) || 0;
      const amount = parseFloat(item.amount) || 0;

      let market = 0;
      if (["股票", "基金", "加密貨幣"].includes(type)) {
        market = units * price;
      } else if (type === "儲蓄保險") {
        market = cost;
      } else {
        market = amount;
      }

      const usdToTwd = exchangeRates["TWD"] || 30;
      const usdToCurrency = exchangeRates[currency] || 1;
      const rate = usdToTwd / usdToCurrency;
      const twdValue = market * rate;

      const key = `${type}_${currency}`;
      if (!summary[key]) {
        summary[key] = { type, currency, market: 0 };
      }
      summary[key].market += twdValue;
    }

    const container = document.getElementById("asset-list");
    let html = "<div>📊 資產分類加總：</div><ul style='margin-top: 0.5rem'>";
    for (const key in summary) {
      const item = summary[key];
      html += `<li>【${item.type}】幣別：${item.currency}｜市值：約 ${Math.round(item.market).toLocaleString()} TWD</li>`;
    }
    html += "</ul>";
    container.innerHTML = html;
  }

  document.addEventListener("DOMContentLoaded", async () => {
    try {
      await FINORA_AUTH.waitForLogin();
      await fetchExchangeRates();
      await loadAssetSummary();
    } catch (e) {
      console.warn("初始化錯誤", e);
      alert("⚠️ 請先登入後再使用此功能");
    }
  });
</script>
</body>
</html>
