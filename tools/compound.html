<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>複利成長試算｜FINORA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      max-width: 720px;
      margin: 0 auto;
      padding: 2rem;
      background: #fffaf8;
      font-family: sans-serif;
    }
    h1, h2 {
      text-align: center;
      color: #c96374;
    }
    label {
      display: block;
      margin-top: 1rem;
    }
    input {
      width: 100%;
      padding: 0.5rem;
      font-size: 1rem;
    }
    button {
      margin-top: 1rem;
      width: 100%;
      padding: 0.7rem;
      font-size: 1.1rem;
      background-color: #c96374;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 8px;
    }
    #result, #exchange-rates, #totals {
      margin-top: 1.5rem;
      background: #fdf0f2;
      padding: 1rem;
      border-left: 5px solid #c96374;
      border-radius: 6px;
      font-size: 1.1rem;
    }
    .asset-item {
      border-bottom: 1px dashed #ccc;
      padding: 0.3rem 0;
    }
    .back-btn {
      text-align: center;
      margin-top: 2rem;
    }
  </style>
</head>
<body>
  <h1>複利成長試算</h1>

  <label>初始投入金額</label>
  <input type="number" id="principal" placeholder="例如：100000" />

  <label>年報酬率（%）</label>
  <input type="number" id="rate" placeholder="例如：5" />

  <label>投資年數</label>
  <input type="number" id="years" placeholder="例如：30" />

  <label>每年固定投入金額</label>
  <input type="number" id="annual" placeholder="例如：10000" />

  <label>每月固定投入金額</label>
  <input type="number" id="monthly" placeholder="例如：1000" />

  <button onclick="calculate()">開始試算</button>
  <div id="result"></div>

  <h2>目前資產分類總覽</h2>
  <div id="asset-list"></div>
  <div id="totals"></div>

  <h2>即時匯率</h2>
  <div id="exchange-rates"></div>

 <a href="../index.html">← 返回首頁</a>
  
  <script>
    let exchangeRates = {};

    function calculate() {
      const principal = parseFloat(document.getElementById("principal").value) || 0;
      const annualRate = parseFloat(document.getElementById("rate").value) / 100 || 0;
      const years = parseInt(document.getElementById("years").value) || 0;
      const annual = parseFloat(document.getElementById("annual").value) || 0;
      const monthly = parseFloat(document.getElementById("monthly").value) || 0;

      const months = years * 12;
      const monthlyRate = annualRate / 12;
      let total = principal;

      for (let m = 1; m <= months; m++) {
        total *= (1 + monthlyRate);
        total += monthly;
        if (m % 12 === 0) total += annual;
      }

      const resultText = `投入 ${years} 年後，期末總資產：約 ${total.toFixed(2)} 元`;
      document.getElementById("result").textContent = resultText;
      localStorage.setItem("compoundResult", total.toFixed(2));
    }

    function renderAssets() {
      const assetList = JSON.parse(localStorage.getItem("assets") || "[]");
      const listDiv = document.getElementById("asset-list");
      const totalsDiv = document.getElementById("totals");
      const totals = {};

      listDiv.innerHTML = "";
      totalsDiv.innerHTML = "";

      if (assetList.length === 0) {
        listDiv.innerHTML = "<p style='color: #999;'>尚無資產資料</p>";
        return;
      }

      assetList.forEach(asset => {
        const type = asset.type || "未分類";
        const currency = asset.currency || "未指定";
        const amount = parseFloat(asset.amount);

        const valid = !isNaN(amount);
        const display = valid
          ? `${type}｜${amount.toLocaleString()} ${currency}`
          : `${type}｜（資料不完整）`;

        const div = document.createElement("div");
        div.className = "asset-item";
        div.textContent = display;
        listDiv.appendChild(div);

        if (valid) {
          totals[currency] = (totals[currency] || 0) + amount;
        }
      });

      totalsDiv.innerHTML = "<b>幣別總額與折合台幣：</b><br>";
      for (const [currency, amount] of Object.entries(totals)) {
        const rate = exchangeRates[currency];
        const twd = rate ? (amount / rate) * exchangeRates["TWD"] : "?";
        totalsDiv.innerHTML += `${currency}：${amount.toFixed(2)}（約 TWD ${twd !== "?" ? twd.toFixed(0) : "?"}）<br>`;
      }
    }

    async function fetchRates() {
  try {
    const res = await fetch("https://api.exchangerate.host/latest?base=USD&symbols=TWD,JPY,EUR,USD");
    const data = await res.json();
    exchangeRates = data.rates;
    if (!exchangeRates || typeof exchangeRates !== "object") throw new Error("格式錯誤");

    localStorage.setItem("exchangeRates", JSON.stringify(exchangeRates));

    document.getElementById("exchange-rates").innerHTML =
      "<b>1 USD 對：</b><br>" +
      Object.entries(exchangeRates)
        .filter(([curr]) => curr !== "USD")
        .map(([curr, rate]) => `${curr}：${rate.toFixed(2)}`)
        .join("<br>");

    renderAssets();

  } catch (e) {
    console.error("匯率查詢失敗", e);

    // 嘗試從 localStorage 載入安全資料
    try {
      const stored = localStorage.getItem("exchangeRates");
      const parsed = (stored && stored !== "undefined") ? JSON.parse(stored) : null;
      exchangeRates = (parsed && typeof parsed === "object") ? parsed : null;
    } catch (e2) {
      exchangeRates = null;
    }

    // 若仍無效，使用預設值
    if (!exchangeRates || typeof exchangeRates !== "object" || Object.keys(exchangeRates).length === 0) {
      exchangeRates = {
        USD: 1,
        TWD: 32,
        JPY: 0.22,
        EUR: 1.08
      };
    }

    document.getElementById("exchange-rates").innerHTML =
      "<b>使用備援匯率：</b><br>" +
      Object.entries(exchangeRates)
        .filter(([curr]) => curr !== "USD")
        .map(([curr, rate]) => `${curr}：${rate.toFixed(2)}`)
        .join("<br>");

    renderAssets();
  }
}
    document.addEventListener("DOMContentLoaded", () => {
      const saved = localStorage.getItem("compoundResult");
      if (saved) {
        document.getElementById("result").textContent =
          `🔁 最近一次試算結果：約 ${Number(saved).toLocaleString()} 元`;
      }
      fetchRates();
    });
  </script>
</body>
</html>
