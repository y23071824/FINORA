<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>複利成長試算｜FINORA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      max-width: 720px;
      margin: 0 auto;
      padding: 2rem;
      background: #fffaf8;
      font-family: sans-serif;
    }
    h1, h2 {
      text-align: center;
      color: #c96374;
    }
    label {
      display: block;
      margin-top: 1rem;
    }
    input {
      width: 100%;
      padding: 0.5rem;
      font-size: 1rem;
    }
    button {
      margin-top: 1rem;
      width: 100%;
      padding: 0.7rem;
      font-size: 1.1rem;
      background-color: #c96374;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 8px;
    }
    #result, #exchange-rates, #totals {
      margin-top: 1.5rem;
      background: #fdf0f2;
      padding: 1rem;
      border-left: 5px solid #c96374;
      border-radius: 6px;
      font-size: 1.1rem;
    }
    .asset-item {
      border-bottom: 1px dashed #ccc;
      padding: 0.3rem 0;
    }
    .back-btn {
      text-align: center;
      margin-top: 2rem;
    }
  </style>
</head>
<body>
  <h1>複利成長試算</h1>

  <label>初始投入金額</label>
  <input type="number" id="principal" placeholder="例如：100000" />

  <label>年報酬率（%）</label>
  <input type="number" id="rate" placeholder="例如：5" />

  <label>投資年數</label>
  <input type="number" id="years" placeholder="例如：30" />

  <label>每年固定投入金額</label>
  <input type="number" id="annual" placeholder="例如：10000" />

  <label>每月固定投入金額</label>
  <input type="number" id="monthly" placeholder="例如：1000" />

  <button onclick="calculate()">開始試算</button>
  <div id="result"></div>

  <h2>目前資產分類總覽</h2>
  <div id="asset-list"></div>
  <div id="totals"></div>

  <h2>即時匯率</h2>
  <div id="exchange-rates"></div>

  <div class="back-btn">
    <a href="../index.html">
      <button style="background:#999; color:white; padding:0.6rem 1.2rem; border-radius:6px; font-size:1rem;">
        ← 返回首頁
      </button>
    </a>
  </div>

  <script>
    let exchangeRates = {};

    function calculate() {
      const principal = parseFloat(document.getElementById("principal").value) || 0;
      const annualRate = parseFloat(document.getElementById("rate").value) / 100 || 0;
      const years = parseInt(document.getElementById("years").value) || 0;
      const annual = parseFloat(document.getElementById("annual").value) || 0;
      const monthly = parseFloat(document.getElementById("monthly").value) || 0;

      const months = years * 12;
      const monthlyRate = annualRate / 12;
      let total = principal;

      for (let m = 1; m <= months; m++) {
        total *= (1 + monthlyRate);
