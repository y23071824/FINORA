<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>複利試算｜FINORA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../style.css" />

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  <!-- FINORA Firebase 模組 -->
  <script src="../firebase-sync.js"></script>
</head>
<body>
  <h1>複利成長試算</h1>
  <!-- ✅ 使用引導區塊 -->
<div class="getting-started">
  <h2>📈 模擬好好未來的可能，就是自信理財的起點</h2>
  <ol>
    <li>🔢 輸入起始金額、年報酬率與時間</li>
    <li>💰 模擬每月或每年持續投入的成長效果</li>
    <li>📊 自動顯示你的目前總資產，提早起跑更有感</li>
  </ol>
  <p class="guide-note">⏳ 愛因斯坦：「複利是宇宙中最強大的力量。」</p>
</div>

  <div id="asset-summary" style="margin: 1rem 0; font-weight: bold;"></div>
  <div id="total-assets">💰 資產加總讀取中...</div>
  <div id="asset-list" style="margin-top: 1rem;"></div>

  <label>初始投入金額（元）：
    <input type="number" id="principal" />
  </label>
  <label>年報酬率（%）：
    <input type="number" id="rate" />
  </label>
  <label>投資年數：
    <input type="number" id="years" />
  </label>
  <label>每年定期投入金額：
    <input type="number" id="annual" />
  </label>
  <label>每月定期投入金額：
    <input type="number" id="monthly" />
  </label>
  <button onclick="calculateCompound()">計算複利</button>

  <div id="result" style="margin-top: 1rem; font-weight: bold;"></div>

  <hr />
  <h2>💱 匯率換算</h2>
  <label>金額：
    <input type="number" id="fx-amount" />
  </label>
  <label>從：
    <select id="fx-from">
      <option>USD</option>
      <option>TWD</option>
      <option>JPY</option>
      <option>EUR</option>
    </select>
  </label>
  <label>轉換為：
    <select id="fx-to">
      <option>TWD</option>
      <option>USD</option>
      <option>JPY</option>
      <option>EUR</option>
    </select>
  </label>
  <button onclick="convertFx()">換算</button>
  <div id="fx-result" style="margin-top: 0.5rem;"></div>
  <div id="exchange-rates" style="margin-top: 1rem;"></div>

<script>
  let exchangeRates = {};

  async function fetchExchangeRates() {
    try {
      const res = await fetch("https://api.exchangerate.host/latest?base=USD&symbols=TWD,JPY,EUR");
      const data = await res.json();
      exchangeRates = data.rates;
      exchangeRates["USD"] = 1;
    } catch (e) {
      console.warn("匯率查詢失敗，改用本地資料");
      exchangeRates = { USD: 1, TWD: 30, JPY: 150, EUR: 0.9 };
    }

    const container = document.getElementById("exchange-rates");
    container.innerHTML = Object.entries(exchangeRates)
      .map(([currency, rate]) => `<div>1 USD = ${rate} ${currency}</div>`)
      .join("");
  }

  function calculateCompound() {
    const p = parseFloat(document.getElementById("principal").value) || 0;
    const r = (parseFloat(document.getElementById("rate").value) || 0) / 100;
    const y = parseInt(document.getElementById("years").value) || 0;
    const annual = parseFloat(document.getElementById("annual").value) || 0;
    const monthly = parseFloat(document.getElementById("monthly").value) || 0;

    let total = p;
    const months = y * 12;
    const monthlyRate = r / 12;

    for (let m = 1; m <= months; m++) {
      total *= (1 + monthlyRate);
      total += monthly;
      if (m % 12 === 0) total += annual;
    }

    document.getElementById("result").textContent =
      `投入 ${y} 年後，期末總資產：約 ${total.toFixed(2)} 元`;

    localStorage.setItem("compoundResult", total.toFixed(2));
  }

  function convertFx() {
    const amt = parseFloat(document.getElementById("fx-amount").value) || 0;
    const from = document.getElementById("fx-from").value;
    const to = document.getElementById("fx-to").value;
    if (!exchangeRates[from] || !exchangeRates[to]) return;
    const result = (amt / exchangeRates[from]) * exchangeRates[to];
    document.getElementById("fx-result").innerText =
      `${amt} ${from} ≈ ${result.toFixed(2)} ${to}`;
  }

  async function loadAssets() {
  if (!exchangeRates["TWD"]) {
    document.getElementById("total-assets").textContent = "⚠️ 匯率尚未就緒，無法顯示市值";
    return;
  }

  const selectedAccount = localStorage.getItem("selectedAccount") || "default";
  let assets = [];

  try {
    assets = await FINORA_AUTH.fetchUserAssets();
  } catch (e) {
    const key = `assets_${selectedAccount}`;
    assets = JSON.parse(localStorage.getItem(key) || "[]");
  }

  let total = 0;
  const summary = {};
  let listHtml = "<ul>";

  for (const item of assets) {
    const type = item.type || "";
    const currency = item.currency || "TWD";
    const price = parseFloat(item.price) || 0;
const units = parseFloat(item.shares) || parseFloat(item.units) || 0;
    const amount = parseFloat(item.amount) || 0;
    const cost = parseFloat(item.cost) || 0;
    const name = item.name || item.symbol || item.stock || item.fund || item.crypto || item.insurance || "-";
    let marketValue = 0;
    let originalCost = 0;
    let profit = 0;

    if (["股票", "基金", "加密貨幣"].includes(type)) {
      marketValue = units * price;
      originalCost = cost;
      profit = marketValue - originalCost;
    } else if (type === "儲蓄保險") {
      marketValue = cost;
      profit = 0;
    } else {
      marketValue = amount;
      profit = 0;
    }

    // 加總邏輯
    if (!summary[type]) summary[type] = {};
    if (!summary[type][currency]) summary[type][currency] = 0;
    summary[type][currency] += marketValue;

    const usdToTwd = exchangeRates["TWD"] || 30;
    const usdToCurrency = exchangeRates[currency] || 1;
    const rate = usdToTwd / usdToCurrency;
    const marketTWD = marketValue * rate;
    const profitTWD = profit * rate;

    total += marketTWD;

    listHtml += `<li><strong>【${type}】</strong> ${name} ｜ 💱 ${currency} ${marketValue.toLocaleString()}（盈餘 ${profitTWD.toFixed(0)} TWD）</li>`;
  }

  listHtml += "</ul>";

  document.getElementById("total-assets").textContent =
    `💰 目前資產總市值（折合台幣）：${Math.round(total).toLocaleString()} 元`;
  document.getElementById("asset-list").innerHTML = listHtml;

  renderAssetSummary(summary);
}

function renderAssetSummary(summary) {
  const summaryContainer = document.getElementById("asset-summary");
  const parts = [];

  for (const [type, byCurrency] of Object.entries(summary)) {
    for (const [currency, amount] of Object.entries(byCurrency)) {
      parts.push(`【${type}】${amount.toLocaleString()} ${currency}`);
    }
  }

  summaryContainer.innerHTML = "<strong>📊 資產分類加總：</strong><br>" + 
  Object.entries(summary).map(([type, byCurrency]) => {
    const line = Object.entries(byCurrency)
      .map(([currency, amount]) => `${amount.toLocaleString()} ${currency}`)
      .join(" ｜ ");
    return `【${type}】${line}`;
  }).join("<br>");
}

  document.addEventListener("DOMContentLoaded", async () => {
    try {
      await FINORA_AUTH.waitForLogin();
      await fetchExchangeRates();
      await loadAssets();

      const saved = localStorage.getItem("compoundResult");
      if (saved) {
        document.getElementById("result").textContent =
          `🔁 最近一次試算結果：約 ${Number(saved).toLocaleString()} 元`;
      }
    } catch (e) {
      alert("請先登入後再使用此功能");
    }
  });
  function logout() {
  firebase.auth().signOut().then(() => {
    localStorage.removeItem("selectedAccount");
    alert("已登出，請重新登入");
    location.reload(); // 重新整理頁面重新觸發登入流程
  }).catch((error) => {
    console.error("登出失敗", error);
    alert("登出失敗，請稍後再試");
  });
  }
</script>
    <a href="../index.html" style="display:block; margin-top: 2rem; text-align:center; color:#c96374">← 返回首頁</a>
</body>
</html>
