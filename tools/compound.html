<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>複利成長試算｜FINORA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../style.css" />
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="../firebase-sync.js"></script>
  <script src="../script.js"></script>
</head>
<body>
  <h1>複利成長試算</h1>

  <label>初始投入金額</label>
  <input type="number" id="principal" placeholder="例如：100000" />
  <label>預估年報酬率（%）</label>
  <input type="number" id="rate" placeholder="例如：5" />
  <label>投資年數</label>
  <input type="number" id="years" placeholder="例如：30" />
  <label>每年固定投入金額（選填）</label>
  <input type="number" id="annual" placeholder="例如：10000" />
  <label>每月固定投入金額（選填）</label>
  <input type="number" id="monthly" placeholder="例如：1000" />
  <button onclick="calculateCompound()">開始試算</button>
  <div id="result"></div>

  <h2>目前資產總覽</h2>
  <div id="category-totals"></div>
  <div id="totals"></div>

  <h2>即時匯率</h2>
  <div id="exchange-rates"></div>

  <h2>匯率計算機</h2>
  <label>金額</label>
  <input type="number" id="fx-amount" value="100" />
  <label>從幣別</label>
  <select id="fx-from">
    <option value="USD">USD</option>
    <option value="TWD">TWD</option>
    <option value="JPY">JPY</option>
    <option value="EUR">EUR</option>
  </select>
  <label>轉換成幣別</label>
  <select id="fx-to">
    <option value="TWD">TWD</option>
    <option value="USD">USD</option>
    <option value="JPY">JPY</option>
    <option value="EUR">EUR</option>
  </select>
  <button onclick="convertFx()">匯率換算</button>
  <div id="fx-result"></div>

  <a href="../index.html" class="home-btn">← 返回首頁</a>

  <script>
    async function initializeCompoundPage() {
      console.log("🔄 初始化複利試算頁...");
      try {
        await fetchExchangeRates();             // 載入即時匯率
        await updateAllStockPrices();           // 載入股票與幣價

        const account = getSelectedAccount();
        const localKey = `assets_${account}`;
        let assets = JSON.parse(localStorage.getItem(localKey) || "[]");

        if (FINORA_AUTH.user && !assets.length) {
          // 雲端有資料但 localStorage 無 → 從雲端下載
          assets = await FINORA_AUTH.fetchUserAssets();
          localStorage.setItem(localKey, JSON.stringify(assets));
        }

        renderAssets(assets);                   // 顯示資產總覽與市值

        const saved = localStorage.getItem("compoundResult");
        if (saved) {
          document.getElementById("result").textContent =
            `🔁 最近一次試算結果：約 ${Number(saved).toLocaleString()} 元`;
        }
      } catch (err) {
        console.error("❌ 初始化失敗", err);
        alert("初始化錯誤，請重新整理或確認登入狀態。");
      }
    }

    function calculateCompound() {
      const p = parseFloat(document.getElementById("principal").value) || 0;
      const r = (parseFloat(document.getElementById("rate").value) || 0) / 100;
      const y = parseInt(document.getElementById("years").value) || 0;
      const annual = parseFloat(document.getElementById("annual").value) || 0;
      const monthly = parseFloat(document.getElementById("monthly").value) || 0;

      let total = p;
      const months = y * 12;
      const monthlyRate = r / 12;

      for (let m = 1; m <= months; m++) {
        total *= (1 + monthlyRate);
        total += monthly;
        if (m % 12 === 0) total += annual;
      }

      document.getElementById("result").textContent =
        `投入 ${y} 年後，期末總資產：約 ${total.toFixed(2)} 元`;
      localStorage.setItem("compoundResult", total.toFixed(2));
    }

    function convertFx() {
      const amt = parseFloat(document.getElementById("fx-amount").value) || 0;
      const from = document.getElementById("fx-from").value;
      const to = document.getElementById("fx-to").value;
      if (!exchangeRates[from] || !exchangeRates[to]) return;
      const result = (amt / exchangeRates[from]) * exchangeRates[to];
      document.getElementById("fx-result").innerText =
        `${amt} ${from} ≈ ${result.toFixed(2)} ${to}`;
    }

    document.addEventListener("DOMContentLoaded", initializeCompoundPage);
  </script>
</body>
</html>
