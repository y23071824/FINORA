<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>複利成長試算｜FINORA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../style.css" />
  <style>
    body {
      max-width: 600px;
      margin: 0 auto;
      padding: 2rem;
      background: #fffaf8;
      font-family: sans-serif;
    }
    h1 {
      text-align: center;
      color: #c96374;
    }
    label {
      display: block;
      margin: 1rem 0 0.3rem;
    }
    input {
      width: 100%;
      padding: 0.5rem;
      font-size: 1rem;
    }
    button {
      margin-top: 1.5rem;
      width: 100%;
      padding: 0.7rem;
      font-size: 1.1rem;
      background-color: #c96374;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 8px;
    }
    #result {
      margin-top: 2rem;
      font-size: 1.2rem;
      text-align: center;
      color: #2a3f4f;
    }
  </style>
</head>
<body>
  <h1>複利成長試算</h1>
  <label for="principal">初始投入金額</label>
  <input type="number" id="principal" placeholder="例如：100000" />

  <label for="rate">年報酬率（%）</label>
  <input type="number" id="rate" placeholder="例如：5" />

  <label for="years">投資年數</label>
  <input type="number" id="years" placeholder="例如：30" />

  <label for="annual">每年固定投入金額（選填）</label>
  <input type="number" id="annual" placeholder="例如：10000" />

  <button onclick="calculate()">試算</button>

  <div id="result"></div>

  <script>
    function calculate() {
      const principal = parseFloat(document.getElementById('principal').value) || 0;
      const rate = parseFloat(document.getElementById('rate').value) / 100 || 0;
      const years = parseInt(document.getElementById('years').value) || 0;
      const annual = parseFloat(document.getElementById('annual').value) || 0;

      let total = principal;

      for (let i = 0; i < years; i++) {
        total *= (1 + rate);
        total += annual;
      }

      document.getElementById('result').textContent = `期末總資產：約 ${total.toFixed(2)} 元`;
    }
  </script>
</body>
</html>
