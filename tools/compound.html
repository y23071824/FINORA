<!-- compound.html -->
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>複利成長試算｜FINORA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../style.css" />
</head>
<body>
  <h1>複利成長試算</h1>

  <label>初始投入金額</label>
  <input type="number" id="principal" placeholder="例如：100000" />
  <label>預估年報酬率（%）</label>
  <input type="number" id="rate" placeholder="例如：5" />
  <label>投資年數</label>
  <input type="number" id="years" placeholder="例如：30" />
  <label>每年固定投入金額（選填）</label>
  <input type="number" id="annual" placeholder="例如：10000" />
  <label>每月固定投入金額（選填）</label>
  <input type="number" id="monthly" placeholder="例如：1000" />
  <button onclick="calculate()">開始試算</button>
  <div id="result"></div>

  <h2>目前資產總覽</h2>
  <div id="category-totals"></div>
  <div id="totals"></div>

  <h2>即時匯率</h2>
  <div id="exchange-rates"></div>

  <h2>匯率計算機</h2>
  <label>金額</label>
  <input type="number" id="fx-amount" value="100" />
  <label>從幣別</label>
  <select id="fx-from">
    <option value="USD">USD</option>
    <option value="TWD">TWD</option>
    <option value="JPY">JPY</option>
    <option value="EUR">EUR</option>
  </select>
  <label>轉換成幣別</label>
  <select id="fx-to">
    <option value="TWD">TWD</option>
    <option value="USD">USD</option>
    <option value="JPY">JPY</option>
    <option value="EUR">EUR</option>
  </select>
  <button onclick="convert()">匯率換算</button>
  <div id="fx-result"></div>

  <div class="back-btn">
    <a href="../index.html">
      <button class="home-btn">← 返回首頁</button>
    </a>
  </div>

  <!-- Firebase SDK & 同步邏輯 -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="../firebase-sync.js"></script>

  <script>
    let exchangeRates = {};
    let cloudAssets = [];

    function calculate() {
      const p = parseFloat(document.getElementById("principal").value) || 0;
      const r = (parseFloat(document.getElementById("rate").value) || 0) / 100;
      const y = parseInt(document.getElementById("years").value) || 0;
      const annual = parseFloat(document.getElementById("annual").value) || 0;
      const monthly = parseFloat(document.getElementById("monthly").value) || 0;
      let total = p;
      const months = y * 12;
      const monthlyRate = r / 12;
      for (let m = 1; m <= months; m++) {
        total *= (1 + monthlyRate);
        total += monthly;
        if (m % 12 === 0) total += annual;
      }
      document.getElementById("result").textContent = `投入 ${y} 年後，期末總資產：約 ${total.toFixed(2)} 元`;
      localStorage.setItem("compoundResult", total.toFixed(2));
    }

    async function fetchRates() {
      try {
        const res = await fetch("https://api.exchangerate.host/latest?base=USD&symbols=TWD,JPY,EUR,USD");
        const data = await res.json();
        exchangeRates = data.rates;
        localStorage.setItem("exchangeRates", JSON.stringify(exchangeRates));
      } catch {
        exchangeRates = JSON.parse(localStorage.getItem("exchangeRates") || "{}");
      }

      document.getElementById("exchange-rates").innerHTML =
        Object.entries(exchangeRates)
          .filter(([k]) => k !== "USD")
          .map(([k, v]) => `1 USD = ${v.toFixed(2)} ${k}`)
          .join("<br>");
    }

    function renderAssets() {
      const totals = {}, categories = {};
      const categoryDiv = document.getElementById("category-totals");
      const totalsDiv = document.getElementById("totals");
      categoryDiv.innerHTML = ""; totalsDiv.innerHTML = "";

      cloudAssets.forEach(asset => {
        const type = asset.type || "未分類";
        const currency = asset.currency || "未指定";
        let amount = parseFloat(asset.amount) || 0;

        if (type === "股票" && asset.shares && asset.price) {
          amount = parseFloat(asset.shares) * parseFloat(asset.price);
        }

        if (type === "加密貨幣" && asset.cryptoAmount && asset.cryptoPrice) {
          amount = parseFloat(asset.cryptoAmount) * parseFloat(asset.cryptoPrice);
        }

        if (!isNaN(amount) && amount > 0) {
          totals[currency] = (totals[currency] || 0) + amount;
          const key = `${type}｜${currency}`;
          categories[key] = (categories[key] || 0) + amount;
        }
      });

      categoryDiv.innerHTML = "<b>📊 資產分類加總（含股票盈餘）：</b><br>";
      for (const [key, val] of Object.entries(categories)) {
        categoryDiv.innerHTML += `${key}：${val.toLocaleString()}<br>`;
      }

      totalsDiv.innerHTML = "<b>幣別總額與折合台幣（含浮動市值）：</b><br>";
      for (const [cur, amt] of Object.entries(totals)) {
        const rate = exchangeRates[cur];
        const twd = rate ? (amt / rate) * exchangeRates["TWD"] : "?";
        totalsDiv.innerHTML += `${cur}：${amt.toFixed(2)}（約 TWD ${twd !== "?" ? twd.toFixed(0) : "?"}）<br>`;
      }
    }

    function convert() {
      const amt = parseFloat(document.getElementById("fx-amount").value) || 0;
      const from = document.getElementById("fx-from").value;
      const to = document.getElementById("fx-to").value;
      if (!exchangeRates[from] || !exchangeRates[to]) return;
      const result = (amt / exchangeRates[from]) * exchangeRates[to];
      document.getElementById("fx-result").innerText = `${amt} ${from} ≈ ${result.toFixed(2)} ${to}`;
    }

    document.addEventListener("DOMContentLoaded", async () => {
      await fetchRates();

      try {
        cloudAssets = await FINORA_AUTH.getUserAssets();
        renderAssets();
      } catch (e) {
        console.warn("⚠️ 雲端資料載入失敗，請確認登入狀態", e);
        document.getElementById("category-totals").innerHTML = "<span style='color:red'>⚠️ 無法取得雲端資產資料</span>";
      }

      const saved = localStorage.getItem("compoundResult");
      if (saved) {
        document.getElementById("result").textContent = `🔁 最近一次試算結果：約 ${Number(saved).toLocaleString()} 元`;
      }
    });
  </script>
</body>
</html>
