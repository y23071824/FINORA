<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>複利試算器｜FINORA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../style.css" />
  <style>
    body {
      max-width: 600px;
      margin: 0 auto;
      padding: 2rem;
      background: #fffaf8;
      font-family: sans-serif;
    }
    h1 {
      text-align: center;
      color: #c96374;
    }
    label {
      display: block;
      margin: 1rem 0 0.3rem;
    }
    input, select {
      width: 100%;
      padding: 0.5rem;
      font-size: 1rem;
    }
    button {
      margin-top: 1.5rem;
      width: 100%;
      padding: 0.8rem;
      background-color: #c96374;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
    }
    #result {
      margin-top: 2rem;
      font-size: 1.2rem;
      color: #444;
      text-align: center;
    }
    a {
      display: block;
      text-align: center;
      margin-top: 2rem;
      color: #c96374;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <h1>複利試算器</h1>
  <label>初始本金（元）：<input type="number" id="principal" /></label>
  <label>年利率（％）：<input type="number" id="rate" step="0.01" /></label>
  <label>投資年數：<input type="number" id="years" /></label>
  <label>定期投入金額（元）：<input type="number" id="regular" /></label>
  <label>投入頻率：
    <select id="frequency">
      <option value="yearly" selected>每年</option>
      <option value="monthly">每月</option>
    </select>
  </label>
  <button onclick="calculateCompound()">開始計算</button>

  <div id="result"></div>
  <a href="../index.html">← 返回首頁</a>

  <script>
    function calculateCompound() {
      const P = parseFloat(document.getElementById("principal").value) || 0;
      const r = parseFloat(document.getElementById("rate").value) || 0;
      const years = parseInt(document.getElementById("years").value) || 0;
      const regular = parseFloat(document.getElementById("regular").value) || 0;
      const freq = document.getElementById("frequency").value;
      let total = P;

      if (years <= 0 || r < 0) {
        document.getElementById("result").textContent = "請輸入正確數值";
        return;
      }

      if (freq === "yearly") {
        for (let i = 1; i <= years; i++) {
          total = total * (1 + r / 100) + regular;
        }
      } else {
        const n = years * 12;
        const monthlyRate = r / 100 / 12;
        for (let i = 1; i <= n; i++) {
          total = total * (1 + monthlyRate) + regular;
        }
      }

      document.getElementById("result").textContent =
        `累積資產：約 NT$ ${total.toLocaleString(undefined, { maximumFractionDigits: 0 })}`;
    }
  </script>
</body>
</html>
