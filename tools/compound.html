<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>複利成長試算｜FINORA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../style.css" />
  <style>
    body {
      max-width: 700px;
      margin: 0 auto;
      padding: 2rem;
      background: #fffaf8;
      font-family: sans-serif;
    }
    h1 {
      text-align: center;
      color: #c96374;
    }
    label {
      display: block;
      margin: 1rem 0 0.3rem;
    }
    input {
      width: 100%;
      padding: 0.5rem;
      font-size: 1rem;
    }
    button {
      margin-top: 1.5rem;
      width: 100%;
      padding: 0.7rem;
      font-size: 1.1rem;
      background-color: #c96374;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 8px;
    }
    #result {
      margin-top: 2rem;
      font-size: 1.2rem;
      text-align: center;
      color: #2a3f4f;
      padding: 1rem;
      background: #fdf0f2;
      border-left: 5px solid #c96374;
      border-radius: 6px;
    }
    canvas {
      display: block;
      margin: 2rem auto;
      max-width: 100%;
      border: 1px solid #ccc;
    }
  </style>
</head>
<body>
  <h1>複利成長試算</h1>
  <label for="principal">初始投入金額</label>
  <input type="number" id="principal" placeholder="例如：100000" />

  <label for="rate">年報酬率（%）</label>
  <input type="number" id="rate" placeholder="例如：5" />

  <label for="years">投資年數</label>
  <input type="number" id="years" placeholder="例如：30" />

  <label for="annual">每年固定投入金額（選填）</label>
  <input type="number" id="annual" placeholder="例如：10000" />

  <label for="monthly">每月固定投入金額（選填）</label>
  <input type="number" id="monthly" placeholder="例如：1000" />

  <button onclick="calculate()">試算</button>

  <div id="result"></div>
  <canvas id="chart" width="600" height="300"></canvas>

  <script>
    function calculate() {
      const principal = parseFloat(document.getElementById('principal').value) || 0;
      const annualRate = parseFloat(document.getElementById('rate').value) / 100 || 0;
      const years = parseInt(document.getElementById('years').value) || 0;
      const annual = parseFloat(document.getElementById('annual').value) || 0;
      const monthly = parseFloat(document.getElementById('monthly').value) || 0;

      const months = years * 12;
      const monthlyRate = annualRate / 12;
      let total = principal;
      const yearlyData = [total];

      for (let m = 1; m <= months; m++) {
        total *= (1 + monthlyRate);
        total += monthly;
        if (m % 12 === 0) {
          total += annual;
          yearlyData.push(total);
        }
      }

      // 顯示結果
      document.getElementById('result').textContent =
        `投入 ${years} 年後，期末總資產：約 ${total.toFixed(2)} 元（含初始投入 ${principal} 元、每年投入 ${annual} 元、每月投入 ${monthly} 元）`;

      drawChart(yearlyData);
    }

    function drawChart(data) {
      const canvas = document.getElementById('chart');
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const padding = 40;
      const chartHeight = canvas.height - padding * 2;
      const chartWidth = canvas.width - padding * 2;
      const max = Math.max(...data);
      const stepX = chartWidth / (data.length - 1);

      // 畫軸線
      ctx.beginPath();
      ctx.moveTo(padding, padding);
      ctx.lineTo(padding, canvas.height - padding);
      ctx.lineTo(canvas.width - padding, canvas.height - padding);
      ctx.strokeStyle = "#666";
      ctx.stroke();

      // 畫折線
      ctx.beginPath();
      data.forEach((val, i) => {
        const x = padding + i * stepX;
        const y = canvas.height - padding - (val / max) * chartHeight;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.strokeStyle = "#c96374";
      ctx.lineWidth = 2;
      ctx.stroke();

      // 標註年份
      ctx.fillStyle = "#444";
      ctx.font = "12px sans-serif";
      for (let i = 0; i < data.length; i++) {
        const x = padding + i * stepX;
        const y = canvas.height - padding + 15;
        ctx.fillText(`第${i}年`, x - 10, y);
      }
    }
  </script>
</body>
</html>
