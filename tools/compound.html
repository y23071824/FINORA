<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>複利成長模擬器</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body>
  <h1>複利成長模擬器</h1>

  <form id="compound-form">
    <label>初始金額：<input type="number" id="initial-amount" required /></label>
    <label>年利率（%）：<input type="number" id="interest-rate" step="0.01" required /></label>
    <label>投資年數：<input type="number" id="years" required /></label>
    <label>每月定期投入金額：<input type="number" id="monthly" required /></label>
    <button type="submit">開始模擬</button>
  </form>

  <div id="result" style="margin-top: 1rem;"></div>

  <div id="total-assets" style="margin-top: 2rem; font-size: 1.1rem; color: #444;"></div>

  <a href="../index.html" style="display:block; margin-top: 2rem; text-align:center; color:#c96374">← 返回首頁</a>

  <script>
    const totalEl = document.getElementById("total-assets");
    const exchangeRates = JSON.parse(localStorage.getItem("exchangeRates") || "{}");
    const assets = JSON.parse(localStorage.getItem("assets") || "[]");

    if (assets.length > 0 && exchangeRates.TWD) {
      let categoryTotals = {};
      let currencyTotals = {};
      let totalTWD = 0;

      assets.forEach(item => {
        let amount = 0, profit = 0;

        if (item.type === "股票") {
          const shares = parseFloat(item.shares) || 0;
          const cost = parseFloat(item.cost) || 0;
          const price = parseFloat(item.price) || 0;
          amount = shares * cost;
          profit = shares * price - amount;
        } else if (item.type === "儲蓄保險") {
          amount = parseFloat(item.policyAmount) || 0;
        } else {
          amount = parseFloat(item.amount) || 0;
        }

        const total = amount + (item.type === "股票" ? profit : 0);
        const currency = item.currency;
        const categoryKey = `${item.type}（${currency}）`;

        categoryTotals[categoryKey] = (categoryTotals[categoryKey] || 0) + total;
        currencyTotals[currency] = (currencyTotals[currency] || 0) + total;

        totalTWD += total * (exchangeRates.TWD / (exchangeRates[currency] || 1));
      });

      const lines = Object.entries(categoryTotals).map(([label, val]) => {
        const match = label.match(/（(.+?)）/);
        const ccy = match ? match[1] : "";
        const rate = exchangeRates.TWD / (exchangeRates[ccy] || 1);
        const twd = val * rate;
        return `💰 ${label}：$${val.toLocaleString()} ≈ NT$ ${Math.round(twd).toLocaleString()}`;
      });

      const currencyLine = Object.entries(currencyTotals)
        .map(([ccy, val]) => `${ccy} $${val.toLocaleString()}`)
        .join(" + ");

      lines.push(`📊 全體資產：${currencyLine}，折合台幣：NT$ ${Math.round(totalTWD).toLocaleString()}`);

      const updateTime = new Date().toLocaleString();
      const usdToTwd = (exchangeRates.TWD).toFixed(2);
      const jpyToTwd = (exchangeRates.TWD / exchangeRates.JPY).toFixed(2);
      const eurToTwd = (exchangeRates.TWD / exchangeRates.EUR).toFixed(2);
      const twdToUsd = (1 / exchangeRates.TWD).toFixed(3);
      const twdToJpy = (exchangeRates.JPY / exchangeRates.TWD).toFixed(3);
      const twdToEur = (exchangeRates.EUR / exchangeRates.TWD).toFixed(3);

      lines.push(`📌 匯率資訊（更新時間：${updateTime}）`);
      lines.push(`1 USD → TWD：${usdToTwd}`);
      lines.push(`1 JPY → TWD：${jpyToTwd}`);
      lines.push(`1 EUR → TWD：${eurToTwd}`);
      lines.push(`1 TWD ≈ ${twdToUsd} USD｜${twdToJpy} JPY｜${twdToEur} EUR`);

      totalEl.innerHTML = lines.join("<br>");
    }

    document.getElementById("compound-form").addEventListener("submit", (e) => {
      e.preventDefault();
      const P = parseFloat(document.getElementById("initial-amount").value);
      const r = parseFloat(document.getElementById("interest-rate").value) / 100 / 12;
      const n = parseInt(document.getElementById("years").value) * 12;
      const m = parseFloat(document.getElementById("monthly").value);

      const FV = P * Math.pow(1 + r, n) + m * ((Math.pow(1 + r, n) - 1) / r);

      document.getElementById("result").innerHTML = `<p>模擬結果：<strong>$${FV.toFixed(2)}</strong></p>`;
    });
  </script>
</body>
</html>
