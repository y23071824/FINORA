<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>複利試算｜FINORA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../style.css" />

  <!-- Firebase & Sync -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  
  <script src="../firebase-sync.js"></script>
</head>
<body>
  <h1>複利成長試算</h1>

  <div id="total-assets">💰 資產加總讀取中...</div>

  <label>初始投入金額（元）：
    <input type="number" id="principal" />
  </label>
  <label>年報酬率（%）：
    <input type="number" id="rate" />
  </label>
  <label>投資年數：
    <input type="number" id="years" />
  </label>
  <label>每年定期投入金額：
    <input type="number" id="annual" />
  </label>
  <label>每月定期投入金額：
    <input type="number" id="monthly" />
  </label>
  <button onclick="calculateCompound()">計算複利</button>

  <div id="result" style="margin-top: 1rem; font-weight: bold;"></div>

  <hr />
  <h2>💱 匯率換算</h2>
  <label>金額：
    <input type="number" id="fx-amount" />
  </label>
  <label>從：
    <select id="fx-from">
      <option>USD</option>
      <option>TWD</option>
      <option>JPY</option>
      <option>EUR</option>
    </select>
  </label>
  <label>轉換為：
    <select id="fx-to">
      <option>TWD</option>
      <option>USD</option>
      <option>JPY</option>
      <option>EUR</option>
    </select>
  </label>
  <button onclick="convertFx()">換算</button>
  <div id="fx-result" style="margin-top: 0.5rem;"></div>
  <div id="exchange-rates" style="margin-top: 1rem;"></div>

  <script>
    let exchangeRates = {};

    function calculateCompound() {
      const p = parseFloat(document.getElementById("principal").value) || 0;
      const r = (parseFloat(document.getElementById("rate").value) || 0) / 100;
      const y = parseInt(document.getElementById("years").value) || 0;
      const annual = parseFloat(document.getElementById("annual").value) || 0;
      const monthly = parseFloat(document.getElementById("monthly").value) || 0;

      let total = p;
      const months = y * 12;
      const monthlyRate = r / 12;

      for (let m = 1; m <= months; m++) {
        total *= (1 + monthlyRate);
        total += monthly;
        if (m % 12 === 0) total += annual;
      }

      document.getElementById("result").textContent =
        `投入 ${y} 年後，期末總資產：約 ${total.toFixed(2)} 元`;

      localStorage.setItem("compoundResult", total.toFixed(2));
    }

    function convertFx() {
      const amt = parseFloat(document.getElementById("fx-amount").value) || 0;
      const from = document.getElementById("fx-from").value;
      const to = document.getElementById("fx-to").value;
      if (!exchangeRates[from] || !exchangeRates[to]) return;
      const result = (amt / exchangeRates[from]) * exchangeRates[to];
      document.getElementById("fx-result").innerText =
        `${amt} ${from} ≈ ${result.toFixed(2)} ${to}`;
    }

    async function fetchExchangeRates() {
      try {
        const res = await fetch("https://api.exchangerate.host/latest?base=USD&symbols=TWD,JPY,EUR");
        const data = await res.json();
        exchangeRates = data.rates;
        exchangeRates["USD"] = 1;
        renderExchangeRates();
      } catch (e) {
        console.warn("匯率查詢失敗，改用本地資料");
        exchangeRates = { USD: 1, TWD: 30, JPY: 150, EUR: 0.9 };
        renderExchangeRates();
      }
    }

    function renderExchangeRates() {
      const container = document.getElementById("exchange-rates");
      container.innerHTML = Object.entries(exchangeRates)
        .map(([currency, rate]) => `<div>1 USD = ${rate} ${currency}</div>`)
        .join("");
    }

    function initializeCompoundPage() {
      const saved = localStorage.getItem("compoundResult");
      if (saved) {
        document.getElementById("result").textContent =
          `🔁 最近一次試算結果：約 ${Number(saved).toLocaleString()} 元`;
      }
    }

    async function loadAssets() {
      const accountId = localStorage.getItem("selectedAccount") || "default";
      const key = `assets_${accountId}`;
      let assets = [];

      try {
        if (typeof FINORA_AUTH !== "undefined" && FINORA_AUTH.fetchUserAssets) {
          assets = await FINORA_AUTH.fetchUserAssets();
        } else {
          assets = JSON.parse(localStorage.getItem(key) || "[]");
        }
      } catch (e) {
        console.warn("⚠️ 載入資產失敗", e);
      }

      let total = 0;
      for (const item of assets) {
        const amount = parseFloat(item.amount) || 0;
        const price = parseFloat(item.price) || 0;
        const units = parseFloat(item.units) || 0;
        const cost = parseFloat(item.cost) || 0;
        const category = item.type;
        let marketValue = 0;

        if (category === "股票" || category === "加密貨幣") {
          marketValue = units * price;
        } else if (category === "基金") {
          marketValue = units * price;
        } else if (category === "儲蓄保險") {
          marketValue = cost;
        } else {
          marketValue = amount;
        }

        const currency = item.currency || "TWD";
        let rate = 1;

        if (currency === "TWD") rate = 1;
        else if (currency === "USD") rate = exchangeRates["TWD"] || 30;
        else if (exchangeRates[currency]) {
          const toUsd = 1 / exchangeRates[currency];
          rate = toUsd * (exchangeRates["TWD"] || 30);
        }

        total += marketValue * rate;
      }

      document.getElementById("total-assets").textContent =
        `💰 目前資產總市值（折合台幣）：${Math.round(total).toLocaleString()} 元`;
      document.getElementById("principal").value = Math.round(total);
    }

    document.addEventListener("DOMContentLoaded", async () => {
      await fetchExchangeRates();
      initializeCompoundPage();
      await loadAssets();
    });
    <script type="module">
  import { FINORA_AUTH } from "../firebase-sync.js";

  document.addEventListener("DOMContentLoaded", async () => {
    try {
      const user = await FINORA_AUTH.waitForLogin(); // 等待登入
      const assets = await FINORA_AUTH.fetchUserAssets(); // 取得雲端資產
      console.log("✅ 成功載入資產", assets);

      // ⬇️ 加入你要顯示的邏輯（例如加總、顯示）
      renderAssetSummary(assets);
    } catch (e) {
      console.warn("⚠️ 無法載入資產：", e.message);
    }
  });

  function renderAssetSummary(assets) {
    // 這裡可以依據你的需求計算與顯示
    const list = document.getElementById("asset-summary");
    if (!list) return;

    let total = 0;
    for (const item of assets) {
      const li = document.createElement("li");
      li.textContent = `${item.type} - ${item.currency} ${item.amount || item.cost || 0}`;
      list.appendChild(li);

      if (item.currency === "TWD") total += parseFloat(item.amount || item.cost || 0);
    }

    const final = document.createElement("li");
    final.innerHTML = `<b>目前 TWD 總額：約 ${total.toLocaleString()} 元</b>`;
    list.appendChild(final);
  }
</script>
</script>
</body>
</html>
