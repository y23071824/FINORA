<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>提領試算｜FINORA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../style.css" />
  <style>
    body {
      max-width: 600px;
      margin: 0 auto;
      padding: 2rem;
      background: #fffaf8;
      font-family: sans-serif;
    }
    h1 {
      text-align: center;
      color: #c96374;
    }
    label {
      display: block;
      margin: 1rem 0 0.3rem;
    }
    input {
      width: 100%;
      padding: 0.5rem;
      font-size: 1rem;
    }
    button {
      margin-top: 1.5rem;
      width: 100%;
      padding: 0.8rem;
      background-color: #c96374;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
    }
    #result {
      margin-top: 2rem;
      font-size: 1.2rem;
      color: #444;
      text-align: center;
    }
    a {
      display: block;
      text-align: center;
      margin-top: 2rem;
      color: #c96374;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <h1>退休提領試算</h1>
  <label>目前資產總額（元）：<input type="number" id="total" /></label>
  <label>每月提領金額（元）：<input type="number" id="monthly" /></label>
  <button onclick="calculateWithdraw()">開始試算</button>

  <div id="result"></div>
  <a href="../index.html">← 返回首頁</a>

  <script>
    function calculateWithdraw() {
      const total = parseFloat(document.getElementById("total").value);
      const monthly = parseFloat(document.getElementById("monthly").value);
      const result = document.getElementById("result");

      if (isNaN(total) || isNaN(monthly) || monthly === 0) {
        result.textContent = "請輸入完整資料（且每月提領金額需大於 0）";
        return;
      }

      const totalMonths = Math.floor(total / monthly);
      const years = Math.floor(totalMonths / 12);
      const months = totalMonths % 12;

      result.textContent = `可以提領：約 ${years} 年 ${months} 個月`;
    }
  </script>
</body>
</html>
