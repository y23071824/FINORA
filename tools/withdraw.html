<!DOCTYPE html><html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>退休提領試算｜FINORA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../style.css" />
  <link rel="icon" href="favicon.png" type="image/png" />
  <!-- ✅ Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

  <style>
    :root {
      --main-color: #b4695d;
      --main-hover: #944647;
      --button-radius: 20px;
      --button-font: 1.1rem;
    }
    body {
      max-width: 600px;
      margin: 0 auto;
      padding: 2rem;
      background: white;
      font-family: sans-serif;
      color: #333;
    }
    h1 {
      text-align: center;
      color: var(--main-color);
    }
    label {
      display: block;
      margin: 1rem 0 0.3rem;
    }
    input {
      width: 100%;
      padding: 0.6rem;
      font-size: 1rem;
      border-radius: 6px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }
    .cta-button {
      display: block;
      margin: 1.5rem auto 0;
      padding: 0.8rem;
      width: 6rem;
      font-size: var(--button-font);
      font-weight: bold;
      background-color: white;
      color: var(--main-color);
      border: 2px solid var(--main-color);
      border-radius: var(--button-radius);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .cta-button:hover {
      background-color: var(--main-color);
      color: white;
    }
    #result, #compound-info, #explanation {
      margin-top: 1.5rem;
      font-size: 1rem;
      line-height: 1.6;
    }
    #compound-info {
      background: #fdf0f2;
      padding: 1rem;
      border-left: 5px solid var(--main-color);
      border-radius: 6px;
      color: #444;
    }
    footer {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.9rem;
      color: #888;
    }
    .footer-links a {
      color: var(--main-color);
      text-decoration: none;
      margin: 0 0.3rem;
    }
  </style>
</head>
<body>
  <h1>退休金怎麼花</h1>
  <div style="color: #555; font-size: 0.9rem;">目前帳本：<strong id="account-id">(讀取中...)</strong></div>  <div class="getting-started">
    <p>💶 輸入預估資產、提領金額或比率，可加入年報酬率與通膨率</p>
  </div><label>預估資產總額（元）：<input type="number" id="total" /></label> <label>每月提領金額（元）：<input type="number" id="monthly" /></label> <label>提領比率（％）：<input type="number" id="withdraw-rate" value="4" step="0.1" /></label> <label>年報酬率（％）：<input type="number" id="return-rate" value="5" step="0.1" /></label> <label>年通膨率（％）：<input type="number" id="inflation-rate" value="2" step="0.1" /></label>

<button class="cta-button" onclick="calculateWithdraw()">試算</button>

  <div id="result"></div>
  <div id="compound-info"></div>
  <div id="explanation">
    <p>📌 <strong>提領方式說明：</strong></p>
    <ul>
      <li><strong>一般月領：</strong>直接用總資產除以每月需求，估算能領幾年。</li>
      <li><strong>4%法則：</strong>每年提領總資產的 4%，以期資產長期抗通膨仍可支撐 30 年以上。</li>
      <li><strong>報酬－通膨：</strong>若輸入年報酬與通膨，會顯示「實質提領能力」。</li>
    </ul>
  </div><a href="../app.html">← 返回首頁</a>

  <script src="../firebase-sync.js"></script>  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      try {
        await FINORA_AUTH.waitForLogin();
        const selectedAccount = localStorage.getItem("selectedAccount");
        const list = await FINORA_AUTH.fetchAccountList();
        const match = list.find(acc => acc.id === selectedAccount);
        const name = match?.displayName || selectedAccount;
        document.getElementById("account-id").textContent = name;

        const saved = localStorage.getItem("compoundResult");
        if (saved && !isNaN(saved)) {
          document.getElementById("total").value = Number(saved);
          document.getElementById("compound-info").innerHTML = `💰 最近一次複利結果：<strong>NT$ ${Number(saved).toLocaleString()}</strong>`;
        }
      } catch (e) {
        alert("請先登入後再使用此功能");
      }
    });

    function calculateWithdraw() {
      const total = parseFloat(document.getElementById("total").value);
      const monthly = parseFloat(document.getElementById("monthly").value);
      const rate = parseFloat(document.getElementById("withdraw-rate").value);
      const r = parseFloat(document.getElementById("return-rate").value);
      const i = parseFloat(document.getElementById("inflation-rate").value);
      const result = document.getElementById("result");
      let output = "";

      if (!total || total <= 0) {
        result.textContent = "請輸入正確的資產總額";
        return;
      }

      if (!isNaN(monthly) && monthly > 0) {
        const months = Math.floor(total / monthly);
        output += `【一般月領試算】每月 NT$ ${monthly.toLocaleString()} 可支撐約 ${Math.floor(months / 12)} 年 ${months % 12} 個月。<br><br>`;
      }

      if (!isNaN(rate) && rate > 0) {
        const yearly = total * rate / 100;
        const m = yearly / 12;
        const duration = total / yearly;
        output += `【${rate}% 提領法】每年約 NT$ ${yearly.toLocaleString()}，每月約 NT$ ${m.toLocaleString()}，預估可支撐 ${duration.toFixed(1)} 年。<br><br>`;
      }

      if (!isNaN(r) && !isNaN(i)) {
        const realRate = ((1 + r / 100) / (1 + i / 100)) - 1;
        const sustain = realRate > 0 ? Math.log(1 / (1 - realRate)) / realRate : "不適用";
        output += `【報酬與通膨調整】實質年報酬率 ${(realRate * 100).toFixed(2)}%。`;
      }

      result.innerHTML = output;
    }
  </script>  <footer>
    <p>© 2025 FINORA 好好存｜家庭友善資產整合工具</p>
    <div class="footer-links">
      <a href="howto.html">使用說明</a>・
      <a href="mailto:service@finora.life?subject=聯絡詢問">聯絡我們</a>
    </div>
  </footer>
</body>
</html>
