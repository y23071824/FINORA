<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>預備金試算｜FINORA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../style.css" />
  <style>
    body {
      max-width: 600px;
      margin: 0 auto;
      padding: 2rem;
      background: #fffaf8;
      font-family: sans-serif;
    }
    h1 {
      text-align: center;
      color: #c96374;
    }
    label {
      display: block;
      margin: 1rem 0 0.3rem;
    }
    input, select {
      width: 100%;
      padding: 0.5rem;
      font-size: 1rem;
    }
    button {
      margin-top: 1rem;
      padding: 0.5rem 1rem;
      background-color: #c96374;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
    }
    .item-group {
.item-group {
  display: flex;
  align-items: center;
  gap: 1.5rem; /* 增加欄位間距 */
  margin-top: 1rem; /* 增加上下留白 */
}

.item-group input[type="text"],
.item-group input[type="number"] {
  flex: 1;
  font-size: 1.2rem;
  padding: 0.8rem;
  height: 3rem;
  border-radius: 8px;
}

.delete-btn {
  background: none;
  border: none;
  font-size: 1.4rem;
  color: #bbb;
  cursor: pointer;
  padding: 0 0.5rem;
  line-height: 1;
  height: 3rem;
}
.delete-btn:hover {
  color: #c96374;
}
  </style>
</head>
<body>
  <h1>緊急預備金試算</h1>

  <h2 style="text-align:center;">每月固定支出清單</h2>
  <div id="expenses"></div>
  <button onclick="addExpense()">＋ 新增支出項目</button>
  <p id="monthly-total" style="margin-top: 1rem; font-weight: bold;"></p>

  <label>預備金涵蓋月數：
    <select id="months">
      <option value="3">3 個月</option>
      <option value="6" selected>6 個月</option>
      <option value="9">9 個月</option>
      <option value="12">12 個月</option>
    </select>
  </label>
  <button onclick="calculateEmergency()">開始試算</button>

  <div id="result"></div>
  <a href="../index.html">← 返回首頁</a>

<script>
  function addExpense(name = "", amount = "") {
    const container = document.getElementById("expenses");
    const group = document.createElement("div");
    group.className = "item-group";
    group.innerHTML = `
      <input type="text" placeholder="項目名稱" value="${name}" />
      <input type="number" placeholder="金額" value="${amount}" />
      <button type="button" class="delete-btn" onclick="removeExpense(this)">🗑</button>
    `;
    container.appendChild(group);
    group.querySelectorAll("input").forEach(input => {
      input.addEventListener("input", updateMonthlyTotal);
    });
  }

  function removeExpense(button) {
    const group = button.parentElement;
    group.remove();
    updateMonthlyTotal();
  }

  function updateMonthlyTotal() {
    const inputs = document.querySelectorAll("#expenses input[type='number']");
    let total = 0;
    inputs.forEach(input => {
      const val = parseFloat(input.value);
      if (!isNaN(val)) total += val;
    });
    document.getElementById("monthly-total").textContent = `目前每月總支出：NT$ ${total.toLocaleString()}`;
  }

  function calculateEmergency() {
    const months = parseInt(document.getElementById("months").value);
    const amountInputs = document.querySelectorAll("#expenses input[type='number']");
    let monthly = 0;
    amountInputs.forEach(input => {
      const val = parseFloat(input.value);
      if (!isNaN(val)) monthly += val;
    });

    const result = document.getElementById("result");
    if (monthly <= 0) {
      result.textContent = "請輸入至少一筆支出金額";
      return;
    }

    const total = monthly * months;
    result.textContent = `建議準備緊急預備金：約 NT$ ${total.toLocaleString()}`;
  }

  document.addEventListener("DOMContentLoaded", () => {
    const assets = JSON.parse(localStorage.getItem("assets") || "[]");
    const rates = JSON.parse(localStorage.getItem("exchangeRates") || "{}");
    let totalTWD = 0;

    assets.forEach(item => {
      let amount = 0;
      const ccy = item.currency;
      const rate = rates["TWD"] / (rates[ccy] || 1);

      if (item.type === "股票") {
        amount = parseFloat(item.shares) * parseFloat(item.price);
      } else if (item.type === "儲蓄保險") {
        amount = parseFloat(item.policyAmount) || 0;
      } else {
        amount = parseFloat(item.amount) || 0;
      }

      if (!isNaN(amount)) {
        totalTWD += amount * rate;
      }
    });

    const info = document.createElement("p");
    info.style.marginTop = "1.5rem";
    info.style.fontSize = "1.1rem";
    info.style.color = "#666";
    info.textContent = `目前已登記資產總額（折合台幣）：NT$ ${totalTWD.toLocaleString(undefined, { maximumFractionDigits: 0 })}`;
    document.body.insertBefore(info, document.getElementById("result"));

    // 預設三項
    addExpense("房租", "");
    addExpense("食物", "");
    addExpense("交通", "");
  });
</script>
</body>
  
</html>
