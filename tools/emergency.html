<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>預備金試算｜FINORA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../style.css" />
  <style>
    body {
      max-width: 600px;
      margin: 0 auto;
      padding: 2rem;
      background: #fffaf8;
      font-family: sans-serif;
    }
    h1 {
      text-align: center;
      color: #c96374;
    }
    label {
      display: block;
      margin: 1rem 0 0.3rem;
    }
    input, select {
      width: 100%;
      padding: 0.5rem;
      font-size: 1rem;
    }
    button {
      margin-top: 1.5rem;
      width: 100%;
      padding: 0.8rem;
      background-color: #c96374;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
    }
    #result {
      margin-top: 2rem;
      font-size: 1.2rem;
      color: #444;
      text-align: center;
    }
    a {
      display: block;
      text-align: center;
      margin-top: 2rem;
      color: #c96374;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <h1>緊急預備金試算</h1>
  <label>每月支出金額（元）：<input type="number" id="monthly-expense" /></label>
  <label>預備金涵蓋月數：
    <select id="months">
      <option value="3">3 個月</option>
      <option value="6" selected>6 個月</option>
      <option value="9">9 個月</option>
      <option value="12">12 個月</option>
    </select>
  </label>
  <button onclick="calculateEmergency()">開始試算</button>

  <div id="result"></div>
  <a href="../index.html">← 返回首頁</a>

  <script>
    function calculateEmergency() {
      const monthly = parseFloat(document.getElementById("monthly-expense").value);
      const months = parseInt(document.getElementById("months").value);
      const result = document.getElementById("result");

      if (isNaN(monthly) || monthly <= 0) {
        result.textContent = "請輸入有效的月支出金額";
        return;
      }

      const total = monthly * months;
      result.textContent = `建議準備緊急預備金：約 NT$ ${total.toLocaleString()}`;
    }
  </script>
</body>
</html>
