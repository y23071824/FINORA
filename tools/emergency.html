<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>緊急預備金試算</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../style.css">
  <style>
    body { max-width: 700px; margin: auto; padding: 1.5rem; font-family: sans-serif; background: #fffaf8; }
    h1 { color: #c96374; text-align: center; }
    h2 { color: #6c6c6c; margin-top: 2rem; }
    .item-row { display: flex; gap: 0.5rem; margin-bottom: 0.5rem; }
    .item-row input { flex: 1; padding: 0.5rem; }
    .item-row button { background: #ffcccc; border: none; padding: 0 0.5rem; cursor: pointer; }
    label, select { margin-top: 1rem; display: block; }
    .summary { margin-top: 1rem; font-weight: bold; }
  </style>
</head>
<body>
  <h1>緊急預備金試算</h1>

  <h2>📝 每月收入登記</h2>
  <div id="income-list"></div>
  <button onclick="addIncome()">+ 新增收入項目</button>
  <div class="summary" id="income-total"></div>

  <h2>💰 每月支出登記</h2>
  <div id="expense-list"></div>
  <button onclick="addExpense()">+ 新增支出項目</button>
  <div class="summary" id="expense-total"></div>

  <h2>💸 預備金建議試算</h2>
  <label>選擇涵蓋月數：
    <select id="reserve-months" onchange="updateSummary()">
      <option value="3">3 個月</option>
      <option value="6">6 個月</option>
      <option value="9">9 個月</option>
      <option value="12">12 個月</option>
    </select>
  </label>
  <div class="summary" id="reserve-suggestion"></div>

  <script>
    let income = JSON.parse(localStorage.getItem('emergencyIncome') || '[]');
    let expenses = JSON.parse(localStorage.getItem('emergencyExpenses') || '[]');

    function saveIncome() {
      localStorage.setItem('emergencyIncome', JSON.stringify(income));
      render();
    }
    function saveExpenses() {
      localStorage.setItem('emergencyExpenses', JSON.stringify(expenses));
      render();
    }

    function addIncome() {
      income.push({ name: '', amount: '' });
      saveIncome();
    }
    function addExpense() {
      expenses.push({ name: '', amount: '' });
      saveExpenses();
    }

    function updateIncomeField(index, key, value) {
      income[index][key] = value;
      saveIncome();
    }
    function updateExpenseField(index, key, value) {
      expenses[index][key] = value;
      saveExpenses();
    }

    function deleteIncome(index) {
      income.splice(index, 1);
      saveIncome();
    }
    function deleteExpense(index) {
      expenses.splice(index, 1);
      saveExpenses();
    }

    function render() {
      const incomeList = document.getElementById('income-list');
      incomeList.innerHTML = income.map((item, i) => `
        <div class="item-row">
          <input placeholder="收入項目" value="${item.name}" oninput="updateIncomeField(${i}, 'name', this.value)">
          <input type="number" placeholder="金額" value="${item.amount}" oninput="updateIncomeField(${i}, 'amount', this.value)">
          <button onclick="deleteIncome(${i})">🗑️</button>
        </div>`).join('');

      const expenseList = document.getElementById('expense-list');
      expenseList.innerHTML = expenses.map((item, i) => `
        <div class="item-row">
          <input placeholder="支出項目" value="${item.name}" oninput="updateExpenseField(${i}, 'name', this.value)">
          <input type="number" placeholder="金額" value="${item.amount}" oninput="updateExpenseField(${i}, 'amount', this.value)">
          <button onclick="deleteExpense(${i})">🗑️</button>
        </div>`).join('');

      const totalIncome = income.reduce((sum, item) => sum + (parseFloat(item.amount) || 0), 0);
      const totalExpense = expenses.reduce((sum, item) => sum + (parseFloat(item.amount) || 0), 0);
      document.getElementById('income-total').textContent = `✔️ 每月收入總額：${totalIncome.toLocaleString()} 元`;
      document.getElementById('expense-total').textContent = `✔️ 每月支出總額：${totalExpense.toLocaleString()} 元`;

      const months = parseInt(document.getElementById('reserve-months').value) || 3;
      const suggestion = totalExpense * months;
      document.getElementById('reserve-suggestion').textContent = `✔️ 建議預備金（${months} 個月）：${suggestion.toLocaleString()} 元`;
    }

    function updateSummary() {
      render();
    }

    document.addEventListener('DOMContentLoaded', render);
  </script>
</body>
</html>
