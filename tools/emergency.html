<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>緊急預備金試算</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../style.css">
  <style>
    body { max-width: 700px; margin: auto; padding: 1.5rem; font-family: sans-serif; background: #fffaf8; }
    h1 { color: #c96374; text-align: center; }
    h2 { color: #6c6c6c; margin-top: 2rem; }
    .item-row { display: flex; gap: 0.5rem; margin-bottom: 0.5rem; }
    .item-row input:nth-child(1) { flex: 0 0 40%; }
    .item-row input:nth-child(2) { flex: 0 0 40%; }
    .item-row button { flex: 0 0 20%; background: #ffcccc; border: none; padding: 0 0.5rem; cursor: pointer; }
    label, select { margin-top: 1rem; display: block; }
    .summary { margin-top: 1rem; font-weight: bold; }
  </style>
</head>
<body>
  <h1>緊急預備金試算</h1>
  <div style="color: #555; font-size: 0.9rem;">目前帳本：<strong id="account-id">(讀取中...)</strong></div>

  <div class="getting-started">
    <h2>🧯 緊急預備金是你好好生活的安全網</h2>
    <ol>
      <li>📝 輸入每月固定收入與支出，定期檢視，為生活建立防火牆</li>
      <li>📆 選擇想準備幾個月的預備金（建議 3～6 個月），系統會即時計算建議金額</li>
    </ol>
    <p class="guide-note">
      ✨ 緊急預備金是給自己與家人最基本的保障，也是理財第一步。
    </p>
  </div>

  <h2>📝 每月收入登記</h2>
  <div id="income-list"></div>
  <button id="add-income">+ 新增收入項目</button>
  <div class="summary" id="income-total"></div>

  <h2>💰 每月支出登記</h2>
  <div id="expense-list"></div>
  <button id="add-expense">+ 新增支出項目</button>
  <div class="summary" id="expense-total"></div>

  <h2>💸 預備金建議試算</h2>
  <label>選擇涵蓋月數：
    <select id="reserve-months">
      <option value="3">3 個月</option>
      <option value="6">6 個月</option>
      <option value="9">9 個月</option>
      <option value="12">12 個月</option>
    </select>
  </label>
  <div class="summary" id="reserve-suggestion"></div>
<script>
  let selectedAccount = localStorage.getItem("selectedAccount");
  let accountNames = JSON.parse(localStorage.getItem("accountNames") || "{}");
  let accountDisplayName = accountNames[selectedAccount] || selectedAccount;

  if (!selectedAccount) {
    alert("⚠️ 尚未選擇帳本，請先回首頁登入並選擇帳本！");
    window.location.href = "../index.html";
  }

  document.getElementById("account-id").textContent = accountDisplayName;

  const incomeKey = `emergencyIncome_${selectedAccount}`;
  const expenseKey = `emergencyExpenses_${selectedAccount}`;

  let income = JSON.parse(localStorage.getItem(incomeKey) || '[]');
  let expenses = JSON.parse(localStorage.getItem(expenseKey) || '[]');

  function saveAndRender() {
    localStorage.setItem(incomeKey, JSON.stringify(income));
    localStorage.setItem(expenseKey, JSON.stringify(expenses));
    render();
  }

  function render() {
    const incomeList = document.getElementById('income-list');
    const expenseList = document.getElementById('expense-list');
    incomeList.innerHTML = '';
    expenseList.innerHTML = '';

    // 收入渲染
    income.forEach((item, i) => {
      const row = document.createElement('div');
      row.className = 'item-row';

      const nameInput = document.createElement('input');
      nameInput.placeholder = '收入項目';
      nameInput.value = item.name || '';
      nameInput.addEventListener('input', () => {
        income[i].name = nameInput.value;
        localStorage.setItem(incomeKey, JSON.stringify(income));
        updateSummary();
      });

      const amountInput = document.createElement('input');
      amountInput.type = 'number';
      amountInput.placeholder = '金額';
      amountInput.value = item.amount || 0;
      amountInput.addEventListener('input', () => {
        income[i].amount = parseFloat(amountInput.value) || 0;
        localStorage.setItem(incomeKey, JSON.stringify(income));
        updateSummary();
      });

      const delBtn = document.createElement('button');
      delBtn.textContent = '🗑️';
      delBtn.addEventListener('click', () => {
        income.splice(i, 1);
        saveAndRender();
      });

      row.appendChild(nameInput);
      row.appendChild(amountInput);
      row.appendChild(delBtn);
      incomeList.appendChild(row);
    });

    // 支出渲染
    expenses.forEach((item, i) => {
      const row = document.createElement('div');
      row.className = 'item-row';

      const nameInput = document.createElement('input');
      nameInput.placeholder = '支出項目';
      nameInput.value = item.name || '';
      nameInput.addEventListener('input', () => {
        expenses[i].name = nameInput.value;
        localStorage.setItem(expenseKey, JSON.stringify(expenses));
        updateSummary();
      });

      const amountInput = document.createElement('input');
      amountInput.type = 'number';
      amountInput.placeholder = '金額';
      amountInput.value = item.amount || 0;
      amountInput.addEventListener('input', () => {
        expenses[i].amount = parseFloat(amountInput.value) || 0;
        localStorage.setItem(expenseKey, JSON.stringify(expenses));
        updateSummary();
      });

      const delBtn = document.createElement('button');
      delBtn.textContent = '🗑️';
      delBtn.addEventListener('click', () => {
        expenses.splice(i, 1);
        saveAndRender();
      });

      row.appendChild(nameInput);
      row.appendChild(amountInput);
      row.appendChild(delBtn);
      expenseList.appendChild(row);
    });

    updateSummary();
  }

  function updateSummary() {
    const totalIncome = income.reduce((sum, item) => sum + (parseFloat(item.amount) || 0), 0);
    const totalExpense = expenses.reduce((sum, item) => sum + (parseFloat(item.amount) || 0), 0);

    document.getElementById('income-total').textContent =
      `✔️ 每月收入總額：${totalIncome.toLocaleString()} 元`;
    document.getElementById('expense-total').textContent =
      `✔️ 每月支出總額：${totalExpense.toLocaleString()} 元`;

    const months = parseInt(document.getElementById('reserve-months').value) || 3;
    const suggestion = totalExpense * months;
    document.getElementById('reserve-suggestion').textContent =
      `✔️ 建議預備金（${months} 個月）：${suggestion.toLocaleString()} 元`;
  }

  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('add-income').addEventListener('click', () => {
      income.push({ name: '', amount: 0 });
      saveAndRender();
    });

    document.getElementById('add-expense').addEventListener('click', () => {
      expenses.push({ name: '', amount: 0 });
      saveAndRender();
    });

    document.getElementById('reserve-months').addEventListener('change', updateSummary);
    render();
  });
</script>
<a href="../index.html" style="display:block; margin-top: 2rem; text-align:center; color:#c96374">← 返回首頁</a>
</body>
</html>
