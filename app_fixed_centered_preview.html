
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>FINORA 好好存</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="favicon.png" type="image/png" />
  <link rel="stylesheet" href="style.css" />
  <style>
    :root {
      --main-color: #b4695d;
      --main-color-hover: #944647;
      --button-border: 2px solid var(--main-color);
    }

    body.logo-full-bg {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 5vh;
      min-height: 100vh;
      margin: 0;
      background-color: white;
      font-family: "Noto Sans", sans-serif;
      color: #333;
      box-sizing: border-box;
    }

    .main-wrapper {
      width: 100%;
      max-width: 640px;
      margin: 0 auto;
      padding: 0 1rem 3rem;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      text-align: center;
      color: var(--main-color);
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      text-align: center;
      font-size: 1rem;
      color: #555;
      margin-bottom: 2rem;
    }

    .grid-button-group {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      place-items: center;
      gap: 1.2rem;
      width: 100%;
      max-width: 500px;
      margin: 0 auto 2rem;
    }

    .grid-button-group a {
      aspect-ratio: 1 / 1;
      width: 100%;
      max-width: 200px;
      font-size: clamp(1rem, 4vw, 1.2rem);
      display: flex;
      align-items: center;
      justify-content: center;
      border: var(--button-border);
      border-radius: 24px;
      color: var(--main-color);
      font-weight: bold;
      background-color: white;
      text-decoration: none;
      word-break: break-word;
    }

    .grid-button-group a:hover {
      background-color: #fcecec;
      color: var(--main-color-hover);
    }

    .grid-button-single {
      display: flex;
      justify-content: center;
      width: 100%;
      max-width: 500px;
      margin: 0 auto 1.5rem;
    }

    .grid-button-single a {
      padding: 1rem;
      font-size: 1rem;
      border: var(--button-border);
      border-radius: 24px;
      color: var(--main-color);
      font-weight: bold;
      text-decoration: none;
      background-color: white;
      cursor: pointer;
      width: 90%;
      max-width: 400px;
      text-align: center;
    }

    footer {
      text-align: center;
      font-size: 0.85rem;
      color: #999;
      padding: 1rem;
    }

    body.logo-full-bg::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-image: url('favicon.png');
      background-repeat: no-repeat;
      background-position: center 20%;
      background-size: 60%;
      opacity: 0.08;
      pointer-events: none;
      z-index: 0;
    }
  </style>
</head>
<body class="logo-full-bg">
  <div class="main-wrapper">
    <h1>FINORA 好好存</h1>
    <p class="subtitle">讓資產更有力，退休不焦慮。</p>
    <div class="grid-button-group">
      <a href="assets.html">資產管理</a>
      <a href="tools/compound.html">複利試算</a>
      <a href="tools/withdraw.html">退休提領</a>
      <a href="tools/emergency.html">預備金試算</a>
    </div>
    <div class="grid-button-single">
      <a href="about.html">品牌故事</a>
    </div>
    <footer>
      <p>© 2025 FINORA 好好存｜家庭友善資產整合工具</p>
    </footer>
  </div>
</body>
</html>
