<!DOCTYPE html><html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title data-i18n="title">FINORA 好好存</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="firebase-sync.js"></script>
  <script src="lang.js"></script>
</head>
<body>
  <h1>FINORA Debug 測試</h1>
  <div id="log-output" style="white-space: pre-wrap; background: #f9f9f9; border: 1px solid #ccc; padding: 1rem; margin: 1rem; border-radius: 6px;"></div>  <script>
    const logArea = document.getElementById("log-output");
    const log = (...args) => {
      const message = args.map(a => (typeof a === 'object' ? JSON.stringify(a) : a)).join(' ');
      console.log("[LOG]", message);
      logArea.textContent += message + "\n";
    };

    const i18n = window.i18n || ((key) => key);
    const lang = localStorage.getItem("lang") || "zh-Hant";
    if (typeof applyLang === "function") applyLang(lang);

    document.addEventListener("DOMContentLoaded", async () => {
      log("📦 DOMContentLoaded 完成");
      if (!window.FINORA_AUTH) {
        log("❌ FINORA_AUTH 未正確載入");
        return;
      }
      log("✅ FINORA_AUTH 已載入");

      const createdAt = localStorage.getItem("userCreatedAt");
      const devMode = localStorage.getItem("devMode") === "yes";
      log("🔍 userCreatedAt:", createdAt);
      log("🔍 devMode:", devMode);

      FINORA_AUTH.onUserChanged(async (user) => {
        if (!user) {
          log("👤 未登入（或已登出）");
        } else {
          log("👤 已登入：", user.email);
        }

        const accountId = FINORA_AUTH.getCurrentAccount();
        log("📘 當前帳本：", accountId);

        try {
          const accounts = await FINORA_AUTH.fetchAccountList();
          log("📂 雲端帳本：", accounts);
        } catch (e) {
          log("⚠️ 無法讀取帳本：", e.message);
        }
      });
    });
  </script></body>
</html>
