<!DOCTYPE html><html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>FINORA Debug 測試</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="firebase-sync.js"></script>
  <style>
    body {
      font-family: sans-serif;
      padding: 2rem;
      background: #fffaf8;
      text-align: center;
    }
    h1 {
      color: #b4695d;
    }
    input {
      margin-top: 1rem;
      padding: 0.5rem;
      width: 90%;
      max-width: 400px;
      font-size: 1rem;
    }
    pre {
      margin-top: 1.5rem;
      text-align: left;
      background: #f0f0f0;
      padding: 1rem;
      border-radius: 6px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <h1>FINORA Debug 測試</h1>
  <input id="currentAccount" placeholder="帳本 ID 顯示區" readonly>
  <pre id="status"></pre>  <script>
    function updateDebugInfo() {
      const currentAccount = window.FINORA_AUTH?.getCurrentAccount?.() || '(無法取得)';
      const selectedAccount = localStorage.getItem("selectedAccount") || '(無)';
      const devMode = localStorage.getItem("devMode") || '(無)';
      const userCreatedAt = localStorage.getItem("userCreatedAt") || '(無)';
      const keys = Object.keys(localStorage).filter(k => k.startsWith("assets_"));

      document.getElementById("currentAccount").value = currentAccount;
      document.getElementById("status").textContent =
`✅ FINORA_AUTH: ${typeof FINORA_AUTH !== 'undefined'}
📘 selectedAccount: ${selectedAccount}
🧰 getCurrentAccount(): ${currentAccount}
🧪 devMode: ${devMode}
📅 userCreatedAt: ${userCreatedAt}
📂 本機帳本 keys:
${keys.join("\n")}`;
    }

    document.addEventListener("DOMContentLoaded", () => {
      setTimeout(updateDebugInfo, 500);
    });
  </script></body>
</html>
