<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Finora 資產管理</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Finora 資產管理</h1>
    <nav>
      <button onclick="switchTab('overview')">資產概覽</button>
      <button onclick="switchTab('simulator')">複利模擬</button>
      <button onclick="switchTab('records')">資產登記</button>
    </nav>
  </header>
  <main>
    <section id="overview" class="tab active">
      <h2>資產概覽</h2>
      <p>這裡將呈現圓餅圖與總覽資訊。</p>
    </section>
    <section id="simulator" class="tab">
      <h2>複利模擬器</h2>
      <p>這裡將設計年化報酬、定期定額等模擬功能。</p>
    </section>
    <section id="records" class="tab">
      <h2>資產登記</h2>
      <form id="asset-form" onsubmit="saveAsset(event)">
        <label>類型：
          <select id="asset-type" onchange="updateExchangeVisibility()">
            <option value="現金">現金</option>
            <option value="股票">股票</option>
            <option value="定存">定存</option>
            <option value="房產">房產</option>
            <option value="其他">其他</option>
          </select>
        </label>
        <label>金額：<input type="number" id="asset-amount" required /></label>
        <label>幣別：
          <select id="asset-currency" onchange="updateExchangeVisibility()">
            <option value="TWD">台幣</option>
            <option value="USD">美金</option>
            <option value="OTHER">其他</option>
          </select>
        </label>
        <div id="exchange-group" style="display:none;">
          <label>匯率（請手動輸入）：<input type="number" id="asset-rate" step="0.01" /></label>
        </div>
        <label>銀行名稱（非必填）：<input type="text" id="asset-bank" /></label>
        <label>備註：<textarea id="asset-note"></textarea></label>
        <button type="submit">儲存資產</button>
      </form>
      <div id="asset-list"></div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
