<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>FINORA 資產整合工具</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      text-align: center;
      font-family: sans-serif;
      background-color: #fffaf8;
      padding: 2rem;
    }
    h1 {
      font-size: 2.5rem;
      color: #c96374;
    }
    p {
      font-size: 1.2rem;
      color: #555;
      margin-bottom: 2rem;
    }
    .button-group {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      max-width: 300px;
      margin: 0 auto;
    }
    .button-group a {
      display: block;
      background-color: #c96374;
      color: white;
      text-decoration: none;
      padding: 1rem;
      border-radius: 10px;
      font-weight: bold;
      transition: background 0.2s;
    }
    .button-group a:hover {
      background-color: #a04d5d;
    }
  </style>
</head>
<body>
  <h1>FINORA</h1>
  <p>讓資產更有力，退休不焦慮</p>

  <div class="button-group">
    <a href="assets.html">開始管理資產</a>
    <a href="tools/compound.html">複利成長模擬器</a>
    <a href="tools/withdraw.html">退休提領試算</a>
    <a href="tools/emergency.html">緊急預備金計算</a>
  </div>

  <!-- 🔐 Firebase 登入區塊 -->
  <div id="firebase-auth" style="text-align: center; margin-top: 2em;">
    <button id="login-btn">🔐 使用 Google 帳號登入</button>
    <button id="logout-btn" style="display:none;">🚪 登出</button>
    <p id="user-email" style="font-size: 0.9em; color: #666;"></p>
  </div>

  <!-- ✅ 載入 Firebase 同步功能 -->
  <script src="firebase-sync.js"></script>
  <script>
    const loginBtn = document.getElementById("login-btn");
    const logoutBtn = document.getElementById("logout-btn");
    const userEmail = document.getElementById("user-email");

    loginBtn?.addEventListener("click", async () => {
      const user = await window.FINORA_AUTH.signInWithGoogle();
      if (user) {
        userEmail.textContent = `已登入：${user.email}`;
        loginBtn.style.display = "none";
        logoutBtn.style.display = "inline-block";
      }
    });

    logoutBtn?.addEventListener("click", () => {
      window.FINORA_AUTH.signOutFromGoogle();
    });

    window.FINORA_AUTH.onUserChanged((user) => {
      if (user) {
        userEmail.textContent = `已登入：${user.email}`;
        loginBtn.style.display = "none";
        logoutBtn.style.display = "inline-block";
      } else {
        userEmail.textContent = "";
        loginBtn.style.display = "inline-block";
        logoutBtn.style.display = "none";
      }
    });
  </script>
</body>
</html>
