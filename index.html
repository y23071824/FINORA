<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>FINORA 資產整合工具</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="theme-selector" style="text-align:center; margin-bottom:1.5rem;"></div>

  <!-- 帳戶選擇彈窗 -->
  <div id="account-selector-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#0008; z-index:9999;">
    <div style="background:#fff; max-width:400px; margin:15% auto; padding:2rem; border-radius:1rem; text-align:center;">
      <h2>選擇或建立帳戶</h2>
      <div id="account-list"></div>
      <input type="text" id="new-account-name" placeholder="輸入帳戶名稱" style="margin-top:1rem; width:80%; padding:0.5rem;" />
      <button id="create-account-btn" style="margin-top:1rem;">➕ 建立帳戶</button>
    </div>
  </div>

  <h1>FINORA</h1>
  <p class="subtitle">讓資產更有力，退休不焦慮。</p>

  <div class="grid-button-group">
    <a href="assets.html">資產管理</a>
    <a href="tools/compound.html">複利試算</a>
    <a href="tools/withdraw.html">退休提領</a>
    <a href="tools/emergency.html">預備金試算</a>
  </div>

  <div id="firebase-auth">
    <button id="login-btn">🔐 使用 Google 帳號登入</button>
    <button id="logout-btn" style="display:none;">🚪 登出</button>
    <p id="user-email" style="font-size: 0.9em; color: #666;"></p>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="firebase-sync.js"></script>

  <script>
    const loginBtn = document.getElementById("login-btn");
    const logoutBtn = document.getElementById("logout-btn");
    const userEmail = document.getElementById("user-email");

    loginBtn?.addEventListener("click", async () => {
      const user = await FINORA_AUTH.signInWithGoogle();
      if (!user) return;

      userEmail.textContent = `已登入：${user.email}`;
      loginBtn.style.display = "none";
      logoutBtn.style.display = "inline-block";

      const showAccountSelector = async () => {
        const db = firebase.firestore();
        const accountsRef = db.collection("users").doc(user.uid).collection("accounts");
        const accountListEl = document.getElementById("account-list");
        const modal = document.getElementById("account-selector-modal");
        const newAccountInput = document.getElementById("new-account-name");
        const createBtn = document.getElementById("create-account-btn");

        accountListEl.innerHTML = "🔄 載入帳戶中...";
        modal.style.display = "block";

        const snapshot = await accountsRef.get();
        accountListEl.innerHTML = "";
        snapshot.forEach(doc => {
          const name = doc.id;
          const btn = document.createElement("button");
          btn.textContent = `🔓 ${name}`;
          btn.style.margin = "0.3rem";
          btn.onclick = async () => {
            try {
              localStorage.setItem("selectedAccount", name);
              modal.style.display = "none";

              const assetSnap = await accountsRef.doc(name).collection("assets").get();
              const assets = assetSnap.docs.map(d => d.data());
              localStorage.setItem("assets", JSON.stringify(assets));
              location.reload();
            } catch (e) {
              alert("❌ 載入帳戶資料失敗，請稍後再試");
              console.error("錯誤：", e);
            }
          };
          accountListEl.appendChild(btn);
        });

        createBtn.onclick = async () => {
          const name = newAccountInput.value.trim();
          if (!name) return alert("請輸入帳戶名稱");
          const exists = (await accountsRef.doc(name).get()).exists;
          if (exists) return alert("帳戶名稱已存在");

          await accountsRef.doc(name).set({ createdAt: firebase.firestore.FieldValue.serverTimestamp() });
          localStorage.setItem("selectedAccount", name);
          modal.style.display = "none";
          localStorage.setItem("assets", "[]");
          location.reload();
        };
      };

      const selectedAccount = localStorage.getItem("selectedAccount");
      if (!selectedAccount) await showAccountSelector();

      const db = firebase.firestore();
      const account = localStorage.getItem("selectedAccount");
      if (!account) return; // 防呆

      const assetSnap = await db.collection("users").doc(user.uid).collection("accounts").doc(account).collection("assets").get();
      const cloudAssets = assetSnap.docs.map(d => d.data());
      const localAssets = JSON.parse(localStorage.getItem("assets") || "[]");

      if (cloudAssets.length > 0 && localAssets.length > 0) {
        const useCloud = confirm("雲端與本地資料皆存在，是否使用雲端資料？\n\n按 [確定] 使用雲端資料\n按 [取消] 保留本地並覆蓋雲端");
        if (useCloud) {
          localStorage.setItem("assets", JSON.stringify(cloudAssets));
        } else {
          const batch = db.batch();
          localAssets.forEach(a => {
            const doc = db.collection("users").doc(user.uid).collection("accounts").doc(account).collection("assets").doc();
            batch.set(doc, a);
          });
          await batch.commit();
        }
      } else if (cloudAssets.length > 0) {
        localStorage.setItem("assets", JSON.stringify(cloudAssets));
      } else if (localAssets.length > 0) {
        const batch = db.batch();
        localAssets.forEach(a => {
          const doc = db.collection("users").doc(user.uid).collection("accounts").doc(account).collection("assets").doc();
          batch.set(doc, a);
        });
        await batch.commit();
      }
    });

    logoutBtn?.addEventListener("click", async () => {
      await FINORA_AUTH.signOutFromGoogle();
      localStorage.removeItem("assets");
      localStorage.removeItem("selectedAccount");
      location.reload();
    });

    FINORA_AUTH.onUserChanged(user => {
      if (user) {
        userEmail.textContent = `已登入：${user.email}`;
        loginBtn.style.display = "none";
        logoutBtn.style.display = "inline-block";
      } else {
        userEmail.textContent = "";
        loginBtn.style.display = "inline-block";
        logoutBtn.style.display = "none";
      }
    });
  </script>

  <p style="text-align:center; font-size:0.8rem; color:#aaa; margin-top:3rem;">v0.8 beta - 2025-05-28</p>
</body>
</html>
