
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>FINORA 資產登記</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>FINORA 資產登記</h1>
  <form id="asset-form">
    <label>種類：
      <input type="text" id="type" required />
    </label><br>
    <label>金額：
      <input type="number" id="amount" required />
    </label><br>
    <label>幣別：
      <select id="currency">
        <option value="TWD">TWD</option>
        <option value="USD">USD</option>
        <option value="JPY">JPY</option>
      </select>
    </label><br>
    <label>銀行：
      <input type="text" id="bank" />
    </label><br>
    <label>備註：
      <input type="text" id="note" />
    </label><br><br>
    <button type="submit">儲存資產</button>
  </form>

  <section id="records-section">
    <h2>資產紀錄</h2>
    <ul id="asset-list"></ul>
    <h3>幣別加總</h3>
    <ul id="totals-list"></ul>
  </section>

  <script src="script.js"></script>
</body>
</html>
