<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FINORA 好好存</title>
  <link rel="icon" href="favicon.png" type="image/png" />
  <style>
    :root {
      --main-color: #b4695d;
    }

    body {
      margin: 0;
      padding: 0;
      background: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .logo-animate {
      width: 60vw;
      max-width: 500px;
      height: auto;
      opacity: 0;
      transform: scale(0.8);
      animation: zoomFadeIn 2s ease-in-out forwards;
    }

    @keyframes zoomFadeIn {
      0% {
        opacity: 0;
        transform: scale(0.8);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
    <a href="language.html">開始使用</a>
  </script>
</head>
<body>
  <img src="logo.png" alt="FINORA logo" class="logo-animate" />
</body>
</html>
