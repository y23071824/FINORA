<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FINORA 資產登記</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>FINORA 資產登記</h1>
  <form id="asset-form">
    <label>種類：
      <select id="type">
        <option value="股票">股票</option>
        <option value="定存">定存</option>
        <option value="現金">現金</option>
        <option value="房產">房產</option>
        <option value="其他">其他</option>
      </select>
    </label>
    <div id="stock-fields" style="display: none;">
      <label>股數：<input type="number" id="shares" /></label>
      <label>張數：<input type="number" id="lots" /></label>
      <label>成本（每股）：<input type="number" id="cost" step="0.01" /></label>
      <label>現價（每股）：<input type="number" id="price" step="0.01" /></label>
    </div>
    <label>金額：
      <input type="number" id="amount" required />
    </label>
    <label>幣別：
      <select id="currency">
        <option value="TWD">TWD</option>
        <option value="USD">USD</option>
        <option value="JPY">JPY</option>
      </select>
    </label>
    <label>銀行：
      <input type="text" id="bank" list="bank-list" />
      <datalist id="bank-list"></datalist>
    </label>
    <label>備註：
      <input type="text" id="note" />
    </label>
    <button type="submit">儲存資產</button>
  </form>

  <section id="records-section">
    <h2>資產紀錄</h2>
    <ul id="asset-list"></ul>
    <h3>幣別加總</h3>
    <ul id="totals-list"></ul>
  </section>

  <section id="exchange-section">
    <h2>匯率換算計算機</h2>
    <label>金額：<input type="number" id="input-amount" /></label>
    <label>匯率（例如 USD→TWD）：<input type="number" id="input-rate" value="30" step="0.01" /></label>
    <button onclick="convertCurrency()">換算</button>
    <p id="converted-result"></p>
  </section>

  <script src="script.js"></script>
</body>
</html>
