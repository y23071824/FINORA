  <style>
    :root {
      --main-color: #b4695d;
    }

    body {
      margin: 0;
      padding: 0;
      background: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      font-family: sans-serif;
    }

    .logo-animate {
      width: 60vw;
      max-width: 500px;
      height: auto;
      opacity: 0;
      transform: scale(0.8);
      animation: zoomFadeIn 2s ease-in-out forwards;
    }

    @keyframes zoomFadeIn {
      0% {
        opacity: 0;
        transform: scale(0.8);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    .start-link {
      margin-top: 2rem;
      font-size: 1.2rem;
      color: var(--main-color);
      border: 2px solid var(--main-color);
      padding: 0.6rem 1.2rem;
      border-radius: 20px;
      text-decoration: none;
      transition: background-color 0.3s;
    }

    .start-link:hover {
      background-color: #f7eae6;
    }

    .note {
      margin-top: 1rem;
      color: gray;
      font-size: 0.9rem;
    }
  </style>
  <script>
