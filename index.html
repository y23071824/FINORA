<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FINORA 好好存</title>
  <link rel="icon" href="favicon.png" type="image/png" />
  <style>
    :root {
      --main-color: #b4695d;
    }

    body {
      margin: 0;
      padding: 0;
      background: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .logo-animate {
      width: 60vw;
      max-width: 500px;
      height: auto;
      opacity: 0;
      transform: scale(0.8);
      animation: zoomFadeIn 1.8s ease-in-out forwards;
    }

    @keyframes zoomFadeIn {
      0% {
        opacity: 0;
        transform: scale(0.8);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
  <script>
    // 🔁 進入頁面後 2 秒自動導向
    window.addEventListener("DOMContentLoaded", () => {
      setTimeout(() => {
        const lang = localStorage.getItem("lang");
        if (lang) {
          window.location.href = "app.html";
        } else {
          window.location.href = "language.html";
        }
      }, 2000);
    });
  </script>
</head>
<body>
  <img src="logo.png" alt="FINORA logo" class="logo-animate" />
</body>
</html>
