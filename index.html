<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>FINORA 資產整合工具</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>FINORA</h1>
  <p class="subtitle">讓資產更有力，退休不焦慮。</p>

  <!-- ✅ 功能選單 -->
  <div class="grid-button-group">
    <a href="assets.html">資產管理</a>
    <a href="tools/compound.html">複利試算</a>
    <a href="tools/withdraw.html">退休提領</a>
    <a href="tools/emergency.html">預備金試算</a>
  </div>

  <!-- ✅ 帳本選擇區 -->
  <section id="account-section" style="margin-top: 2rem;">
    <label for="account-select">帳本選擇：</label>
    <select id="account-select"></select>
    <button id="rename-account-btn">✏️ 重新命名</button>
    <button id="new-account-btn">➕ 新增帳本</button>
    <input type="text" id="new-account-name" placeholder="輸入新帳本名稱" style="display:none; margin-top: 0.5rem;" />
    <button id="save-new-account" style="display:none;">儲存新帳本</button>
  </section>

  <!-- ✅ 帳本列表含刪除 -->
  <div id="account-list" style="display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 1rem;"></div>

  <!-- ✅ 登入區 -->
  <div id="firebase-auth" style="margin-top: 1.5rem;">
    <button id="login-btn">🔐 使用 Google 帳號登入</button>
    <button id="logout-btn" style="display:none;">🚪 登出</button>
    <p id="user-email" style="font-size: 0.9em; color: #666;"></p>
  </div>

  <!-- ✅ Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="firebase-sync.js"></script>

  <!-- ✅ 主程式邏輯 -->
  <script>
    const loginBtn = document.getElementById("login-btn");
    const logoutBtn = document.getElementById("logout-btn");
    const userEmail = document.getElementById("user-email");
    const accountSelect = document.getElementById("account-select");
    const renameBtn = document.getElementById("rename-account-btn");
    const newAccountBtn = document.getElementById("new-account-btn");
    const newAccountInput = document.getElementById("new-account-name");
    const saveNewAccountBtn = document.getElementById("save-new-account");
    let accountMap = {};

    loginBtn.addEventListener("click", async () => {
      const user = await FINORA_AUTH.signInWithGoogle();
      if (user) {
        userEmail.textContent = `已登入：${user.email}`;
        loginBtn.style.display = "none";
        logoutBtn.style.display = "inline-block";
        await loadAccounts();
      }
    });

    logoutBtn.addEventListener("click", async () => {
      await FINORA_AUTH.signOutFromGoogle();
      localStorage.removeItem("selectedAccount");
      accountSelect.innerHTML = "";
      userEmail.textContent = "";
      loginBtn.style.display = "inline-block";
      logoutBtn.style.display = "none";
    });

    FINORA_AUTH.onUserChanged(async (user) => {
      if (user) {
        userEmail.textContent = `已登入：${user.email}`;
        loginBtn.style.display = "none";
        logoutBtn.style.display = "inline-block";
        await loadAccounts();
      } else {
        userEmail.textContent = "";
        loginBtn.style.display = "inline-block";
        logoutBtn.style.display = "none";
        accountSelect.innerHTML = "";
        document.getElementById("account-list").innerHTML = "";
      }
    });

    async function loadAccounts() {
      const list = await FINORA_AUTH.fetchAccountList();
      accountSelect.innerHTML = "";
      accountMap = {};
      list.forEach(acc => {
        accountMap[acc.id] = acc.displayName || acc.id;
        const opt = document.createElement("option");
        opt.value = acc.id;
        opt.textContent = accountMap[acc.id];
        accountSelect.appendChild(opt);
      });
      const selected = localStorage.getItem("selectedAccount") || list[0]?.id;
      if (selected) {
        accountSelect.value = selected;
        localStorage.setItem("selectedAccount", selected);
      }

      renderAccountList(list);
    }

  function renderAccountList(list) {
  const container = document.getElementById("account-list");
  container.innerHTML = "";

  list.forEach(account => {
    const wrapper = document.createElement("div");
    wrapper.style.display = "flex";
    wrapper.style.alignItems = "center";
    wrapper.style.border = "1px solid #ccc";
    wrapper.style.borderRadius = "8px";
    wrapper.style.padding = "0.3em 0.6em";
    wrapper.style.fontSize = "0.9em";
    wrapper.style.background = "#f9f9f9";
    wrapper.style.maxWidth = "calc(33% - 1rem)";
    wrapper.style.flex = "1 1 30%";
    wrapper.style.justifyContent = "space-between";

    const nameSpan = document.createElement("span");
    nameSpan.textContent = account.displayName || account.id;

    const delBtn = document.createElement("button");
    delBtn.textContent = "🗑️";
    delBtn.style.marginLeft = "0.5em";
    delBtn.style.fontSize = "0.8em";
    delBtn.style.padding = "0.2em 0.4em";
    delBtn.style.border = "none";
    delBtn.style.background = "transparent";
    delBtn.style.color = "#d33";
    delBtn.style.cursor = "pointer";
    delBtn.title = "刪除帳本";

    delBtn.onclick = async () => {
      if (!confirm(`確定要刪除帳本「${account.displayName || account.id}」？此操作無法復原。`)) return;

      try {
        await FINORA_AUTH.deleteAccount(account.id);
        if (account.id === localStorage.getItem("selectedAccount")) {
          localStorage.removeItem("selectedAccount");
          alert("帳本已刪除，請重新選擇！");
          location.reload();
        } else {
          await loadAccounts();
        }
      } catch (e) {
        alert("⚠️ 無法刪除帳本，請確認已登入！");
        console.error(e);
      }
    };

    wrapper.appendChild(nameSpan);
    wrapper.appendChild(delBtn);
    container.appendChild(wrapper);
  });
}

    accountSelect.addEventListener("change", () => {
      const selected = accountSelect.value;
      localStorage.setItem("selectedAccount", selected);
      location.reload();
    });

    renameBtn.addEventListener("click", async () => {
      try {
        const id = accountSelect.value;
        const currentName = accountMap[id] || id;
        const newName = prompt("輸入新的帳本名稱：", currentName);
        if (newName && newName !== currentName) {
          await FINORA_AUTH.setAccountDisplayName(id, newName);
          await loadAccounts();
        }
      } catch (e) {
        alert("⚠️ 請先登入後才能重新命名帳本！");
        console.warn(e);
      }
    });

    newAccountBtn.addEventListener("click", () => {
      newAccountInput.style.display = "inline-block";
      saveNewAccountBtn.style.display = "inline-block";
    });

    saveNewAccountBtn.addEventListener("click", async () => {
      try {
        const name = newAccountInput.value.trim();
        if (!name) return;

        const existing = await FINORA_AUTH.fetchAccountList();
        if (existing.length >= 3) {
          alert("⚠️ 帳本數已達上限（最多 3 本）");
          return;
        }

        const id = `帳本${Date.now()}`;
        localStorage.setItem("selectedAccount", id);
        await FINORA_AUTH.setAccountDisplayName(id, name);
        await loadAccounts();
        location.reload();
      } catch (e) {
        alert("⚠️ 請先登入後才能新增帳本！");
        console.warn(e);
      }
    });
  </script>

  <p style="text-align:center; font-size:0.8rem; color:#aaa; margin-top:3rem;">
    v0.9 beta - 2025-05-29
  </p>
</body>
</html>
