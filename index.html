<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FINORA 資產登記</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>FINORA 資產登記</h1>
  <form id="asset-form">
    <label>種類：
      <select id="type">
        <option value="">請選擇</option>
        <option value="股票">股票</option>
        <option value="定存">定存</option>
        <option value="現金">現金</option>
        <option value="房產">房產</option>
        <option value="儲蓄保險">儲蓄保險</option>
        <option value="其他">其他</option>
      </select>
    </label><br>

    <div id="stock-fields" style="display:none;">
      <label>股票類別：<input id="stock-category" /></label><br>
      <label>股數：<input id="shares" type="number" /></label><br>
      <label>成本：<input id="cost" type="number" /></label><br>
      <label>現價：<input id="price" type="number" /></label><br>
    </div>

    <div id="insurance-fields" style="display:none;">
      <label>保單名稱：<input id="policy-name" /></label><br>
      <label>保額：<input id="policy-amount" type="number" /></label><br>
      <label>年期：<input id="policy-years" type="number" /></label><br>
      <label>年繳保費：<input id="policy-premium" type="number" /></label><br>
    </div>

    <div id="amount-field">
      <label>金額：<input id="amount" type="number" /></label><br>
    </div>

    <label>幣別：<input id="currency" /></label><br>
    <label>銀行名稱：<input id="bank" list="bank-list" /></label>
    <datalist id="bank-list"></datalist><br>
    <label>備註：<input id="note" /></label><br>

    <button type="submit">儲存資產</button>
  </form>

  <h2>資產紀錄</h2>
  <ul id="asset-list"></ul>

  <h2>總資產加總（含股票盈餘）</h2>
  <ul id="totals-list"></ul>

  <script src="script.js"></script>
</body>
</html>
