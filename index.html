
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finora v2.4</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Finora v2.4 資產登記</h1>
  <form id="asset-form" onsubmit="saveAsset(event)">
    <label>類型：<select id="type">
      <option value="現金">現金</option>
      <option value="股票">股票</option>
      <option value="定存">定存</option>
    </select></label>
    <label>金額：<input type="number" id="amount" /></label>
    <label>幣別：<select id="currency">
      <option value="TWD">TWD</option>
      <option value="USD">USD</option>
      <option value="OTHER">OTHER</option>
    </select></label>
    <label>匯率：<input type="number" id="rate" value="1" /></label>
    <label>銀行：<input id="bank" list="bank-list" /></label>
    <datalist id="bank-list"></datalist>
    <label>備註：<input id="note" /></label>
    <button type="submit">儲存資產</button>
  </form>
  <div id="asset-list"></div>
  <div id="summary"></div>
  <script src="script.js"></script>
</body>
</html>
