<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>FINORA 資產整合工具</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>FINORA</h1>
  <p class="subtitle">讓資產更有力，退休不焦慮。</p>

  <div class="grid-button-group">
    <a href="assets.html">資產管理</a>
    <a href="tools/compound.html">複利試算</a>
    <a href="tools/withdraw.html">退休提領</a>
    <a href="tools/emergency.html">預備金試算</a>
  </div>

  <div id="firebase-auth" style="text-align:center; margin-top: 2rem;">
    <button id="login-btn">🔐 使用 Google 帳號登入</button>
    <button id="logout-btn" style="display:none;">🚪 登出</button>
    <p id="user-email" style="font-size: 0.9em; color: #666;"></p>
  </div>

  <div id="account-selector" style="display:none; margin-top: 1rem; text-align: center;">
    <label for="account-switcher" style="font-size: 0.95rem; color: #555;">🔄 切換帳本：</label>
    <select id="account-switcher" style="padding: 0.4rem; font-size: 1rem;">
      <option value="default">default</option>
      <option value="家庭帳本">家庭帳本</option>
      <option value="退休帳本">退休帳本</option>
      <option value="新增帳本">➕ 新增帳本...</option>
    </select>
  </div>

  <!-- Firebase 套件與同步模組 -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="firebase-sync.js"></script>

  <script>
    const loginBtn = document.getElementById("login-btn");
    const logoutBtn = document.getElementById("logout-btn");
    const userEmail = document.getElementById("user-email");
    const accountSelector = document.getElementById("account-selector");
    const accountSwitcher = document.getElementById("account-switcher");

    loginBtn?.addEventListener("click", async () => {
      const user = await FINORA_AUTH.signInWithGoogle();
      if (user) {
        userEmail.textContent = `已登入：${user.email}`;
        loginBtn.style.display = "none";
        logoutBtn.style.display = "inline-block";

        if (!localStorage.getItem("selectedAccount")) {
          FINORA_AUTH.setSelectedAccount("default");
        }

        const cloudAssets = await FINORA_AUTH.loadUserAssets();
        const localAssets = JSON.parse(localStorage.getItem("assets") || "[]");

        if (cloudAssets.length > 0 && localAssets.length > 0) {
          const useCloud = confirm("雲端與本地資料皆存在，是否使用雲端資料？\n\n按 [確定] 使用雲端資料\n按 [取消] 保留本地並覆蓋雲端");
          if (useCloud) {
            localStorage.setItem("assets", JSON.stringify(cloudAssets));
          } else {
            await FINORA_AUTH.saveUserAssets(localAssets);
          }
        } else if (cloudAssets.length > 0) {
          localStorage.setItem("assets", JSON.stringify(cloudAssets));
        } else if (localAssets.length > 0) {
          await FINORA_AUTH.saveUserAssets(localAssets);
        }

        location.reload(); // 確保畫面與資料同步
      }
    });

    logoutBtn?.addEventListener("click", async () => {
      await FINORA_AUTH.signOutFromGoogle();
      localStorage.removeItem("assets");
      localStorage.removeItem("selectedAccount");
      location.reload(); // 登出後刷新畫面
    });

    FINORA_AUTH.onUserChanged(user => {
      if (user) {
        userEmail.textContent = `已登入：${user.email}`;
        loginBtn.style.display = "none";
        logoutBtn.style.display = "inline-block";
        accountSelector.style.display = "block";

        const current = FINORA_AUTH.getCurrentAccount() || "default";
        accountSwitcher.value = current;
      } else {
        userEmail.textContent = "";
        loginBtn.style.display = "inline-block";
        logoutBtn.style.display = "none";
        accountSelector.style.display = "none";
      }
    });

    accountSwitcher.addEventListener("change", async (e) => {
      let selected = e.target.value;

      if (selected === "新增帳本") {
        const newName = prompt("請輸入新帳本名稱（例如：投資帳本）：");
        if (!newName) {
          accountSwitcher.value = FINORA_AUTH.getCurrentAccount() || "default";
          return;
        }
        selected = newName.trim();
        const option = document.createElement("option");
        option.value = selected;
        option.textContent = selected;
        accountSwitcher.insertBefore(option, accountSwitcher.lastChild); // 插入在「新增帳本」前
        accountSwitcher.value = selected;
      }

      FINORA_AUTH.setSelectedAccount(selected);
      const cloudAssets = await FINORA_AUTH.loadUserAssets();
      localStorage.setItem("assets", JSON.stringify(cloudAssets));
      alert(`✅ 已切換帳本為 ${selected}`);
      location.reload();
    });
  </script>
</body>
</html>
