<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title data-i18n="title">FINORA 好好存</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="favicon.png" type="image/png" />
  <link rel="stylesheet" href="style.css" />
  <style>  
  :root {  
  --main-color: #b4695d;  
  --main-color-hover: #944647;  
  --main-color-bg: #f5e8e6;  
  --button-radius: 20px;  
  --button-font: 1.1rem;  
  --button-border: 2px solid var(--main-color);  
  --container-width: 700px;  
}  body {
margin: 0;
font-family: "Noto Sans", sans-serif;
background-color: white;
color: #333;
display: flex;
flex-direction: column;
align-items: center;
}


/* ✅ 標題與副標題 */
h1 {
text-align: center;
color: var(--main-color);
font-size: 1.8rem;
margin-top: 2rem;
margin-bottom: 0.5rem;
}
.subtitle {
text-align: center;
font-size: 1rem;
color: #555;
margin-bottom: 2rem;
}

/* ✅ 主按鈕群組 */
.grid-button-group {
display: grid;
grid-template-columns: repeat(2, 1fr);
gap: 1rem;
margin-bottom: 1.5rem;
justify-content:center;
}
.grid-button-group a,
.grid-button-group button {
aspect-ratio: 1 / 1;
font-size: clamp(1rem, 4vw, 1.2rem);
text-align: center;
display: flex;
align-items: center;
justify-content: center;
border: 2px solid var(--main-color);
border-radius: 24px;
color: var(--main-color);
font-weight: bold;
text-decoration: none;
background-color: white;
cursor: pointer;
word-break: break-word;
}
.grid-button-group a:hover,
.grid-button-group button:hover {
background-color: #fcecec;
color: #a94456;
}

/* ✅ 品牌故事按鈕為長方形 */
.grid-button-single {
margin-bottom: 2rem;
}
.grid-button-single a {
padding: 1rem;
font-size: 1rem;
border: 2px solid var(--main-color);
border-radius: 24px;
color: var(--main-color);
font-weight: bold;
text-decoration: none;
background-color: white;
cursor: pointer;
width: 90%;
max-width: 400px;
text-align: center;
}


/* ✅ 全域按鈕設定 */
button,
.grid-button-group a,
.cta-full,
.action-button {
  font-size: 1rem;
  border: 2px solid var(--main-color);
  border-radius: 24px;
  color: var(--main-color);
  font-weight: bold;
  text-decoration: none;
  background-color: white;
  cursor: pointer;
  width: 90%;
  max-width: 400px;
  text-align: center;
  padding: 0.8rem 1rem;
  box-sizing: border-box;
}

/* ✅ 帳本管理區塊 */
.account-wrapper {
  text-align: center;
  margin-bottom: 2rem;
}
.account-controls {
  display: flex;
  justify-content: center;
  gap: 0.75rem;
  margin-top: 1rem;
}
.account-controls button {
  flex: 1;
  min-width: 60px;
  padding: 0.8rem;
  font-size: 1.1rem;
  border: 2px solid var(--main-color);
  border-radius: 16px;
  background-color: white;
  color: var(--main-color);
  font-weight: bold;
  text-align: center;
}

/* ✅ 登入/登出按鈕 */
#firebase-auth {
  text-align: center;
  margin-top: 1.5rem;
}

/* ✅ 語言切換 */
.lang-selector {
  text-align: center;
  margin-top: 1.5rem;
}

/* ✅ 說明與頁尾 */
.privacy-note {
  text-align: center;
  font-size: 0.85rem;
  color: #777;
  margin-top: 2rem;
}
footer {
  text-align: center;
  font-size: 0.85rem;
  color: #999;
  padding: 1rem;
}
.footer-links a {
  margin: 0 0.25rem;
  color: #999;
  text-decoration: none;
}

/* ✅ 浮水印背景 */
body.logo-full-bg::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background-image: url('favicon.png');
  background-repeat: no-repeat;
  background-position: center 20%;
  background-size: 60%;
  opacity: 0.08;
  pointer-events: none;
  z-index: 0;
}

/* ✅ 主要容器 */
body.logo-full-bg {
  padding: 0 !important;
  max-width: 100% !important;
}
.main-wrapper {
  width: 100%;
  max-width: 640px;  /* 從 480 擴大 */
  margin-left: auto;
  margin-right: auto;
  padding: 0 1rem;
  box-sizing: border-box;
}

/* ✅ 按鈕群組（正方形兩列置中） */
.grid-button-group {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 1.2rem;
  width: 100%;
  max-width: 500px;
  margin: 0 auto 2rem;
  justify-items: center;
  justify-content: center
}
.grid-button-group a {
  aspect-ratio: 1 / 1;
  width: 100%;
  max-width: 200px;
  font-size: 1.2rem;
}

/* ✅ 單列置中按鈕區塊 */
.grid-button-single {
  display: flex;
  justify-content: center;
  padding: 0 1rem;
  max-width: 500px;
  margin: 0 auto 1.5rem;
}
    

  </style>    
</head>

<body class="logo-full-bg">
  <div class="main-wrapper">
    <h1 data-i18n="title">FINORA 好好存</h1>
    <p class="subtitle" data-i18n="subtitle">讓資產更有力，退休不焦慮。</p>

    <div class="grid-button-group">
      <a href="assets.html" data-i18n="asset">資產管理</a>
      <a href="tools/compound.html" data-i18n="compound">複利試算</a>
      <a href="tools/withdraw.html" data-i18n="withdraw">退休提領</a>
      <a href="tools/emergency.html" data-i18n="emergency">預備金試算</a>
    </div>

    <div class="grid-button-single">
      <a href="about.html" data-i18n="nav_about">品牌故事</a>
    </div>

    <div class="account-wrapper">
      <label for="account-select" data-i18n="accountLabel">帳本選擇：</label>
      <select id="account-select" style="margin-top: 0.5rem; width: 90%; max-width: 320px;"></select>
      <div class="account-controls">
        <button id="rename-account-btn" data-i18n="rename">✏️</button>
        <button id="new-account-btn" data-i18n="add">➕</button>
        <button id="delete-account-btn" data-i18n="delete">🗑️</button>
      </div>
      <div id="new-account-input-group" style="display: none; margin-top: 1rem;">
        <input type="text" id="new-account-name" placeholder="輸入新帳本名稱" data-i18n-placeholder="placeholderNewAccount" />
        <button id="save-new-account" data-i18n="save">儲存</button>
      </div>
    </div>

    <div id="firebase-auth">
      <button id="login-btn" data-i18n="login">🔐 使用 Google 帳號登入</button>
      <button id="logout-btn" data-i18n="logout" style="display:none;">🚪 登出</button>
    </div>

    <div class="lang-selector">
      <label for="lang-select" data-i18n="langLabel">🌐 Language / 語言：</label>
      <select id="lang-select">
        <option value="zh-Hant">繁體中文</option>
        <option value="zh-Hans">简体中文</option>
        <option value="en">English</option>
        <option value="ja">日本語</option>
      </select>
    </div>
 <!-- 🔧 Dev Mode 切換 -->
    <div style="text-align:center; margin-top:1rem;">
      <button style="opacity: 0.4; font-size: 0.75rem; margin: 0.25rem;" onclick="
        localStorage.setItem('devMode','yes');
        alert('✅ 已啟用開發模式（devMode = yes）');
        location.reload();
      ">啟用開發模式</button>

      <button style="opacity: 0.4; font-size: 0.75rem; margin: 0.25rem;" onclick="
        localStorage.removeItem('devMode');
        alert('❌ 已關閉開發模式（devMode 已清除）');
        location.reload();
      ">關閉開發模式</button>
    </div>

    <p class="privacy-note" data-i18n="privacy">FINORA 重視隱私。你的資產，只屬於你自己。</p>

    <footer>
      <p data-i18n="footer">© 2025 FINORA 好好存｜家庭友善資產整合工具</p>
      <div class="footer-links">
        <a href="howto.html" data-i18n="guide">使用說明</a>・
        <a href="mailto:service@finora.life?subject=聯絡詢問" data-i18n="contact">聯絡我們</a>・
        <a href="privacy.html" data-i18n="policy">隱私權條款</a>
      </div>
    </footer>
  </div>

  <!-- 🌟 升級提示與帳本保留 Modal -->
  <div id="upgrade-modal" style="display:none;"></div>
  <div id="account-retain-modal" style="display:none;"></div>

  <!-- Firebase SDK 與腳本 -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="firebase-sync.js"></script>
  <script src="lang.js"></script>
  
<script>
// ✅ 初始化與語言設定
const lang = localStorage.getItem("lang") || "zh-Hant";
if (typeof applyLang === "function") applyLang(lang);

document.addEventListener("DOMContentLoaded", async () => {
  const langSelect = document.getElementById("lang-select");
  if (langSelect) {
    langSelect.value = lang;
    langSelect.addEventListener("change", function () {
      localStorage.setItem("lang", this.value);
      location.reload();
    });
  }

  // ✅ 第一次登入記錄建立時間
  if (!localStorage.getItem("userCreatedAt")) {
    localStorage.setItem("userCreatedAt", Date.now().toString());
  }

  // ✅ 判斷是否為免費用戶
  function isFreeUser() {
    if (localStorage.getItem("devMode") === "yes") return false;
    const createdAt = localStorage.getItem("userCreatedAt");
    if (!createdAt) return true;
    const daysUsed = (Date.now() - parseInt(createdAt, 10)) / (1000 * 60 * 60 * 24);
    return daysUsed > 30;
  }

  // ✅ 顯示保留帳本 modal
  function showAccountRetentionModal(accounts) {
    const select = document.createElement("select");
    select.id = "retain-select";
    accounts.forEach(acc => {
      const opt = document.createElement("option");
      opt.value = acc.id;
      opt.textContent = acc.displayName || acc.id;
      select.appendChild(opt);
    });
    const modal = document.getElementById("account-retain-modal");
    modal.innerHTML = `
      <div style="background:white;padding:2rem;border-radius:12px;text-align:center;max-width:360px;margin:auto">
        <p>請選擇您要保留的帳本：</p>
        ${select.outerHTML}
        <button onclick="confirmAccountRetention()">確定</button>
      </div>
    `;
    modal.style.display = "flex";
  }

  // ✅ 確認保留帳本
  window.confirmAccountRetention = function () {
    const selected = document.getElementById("retain-select").value;
    localStorage.setItem("retainedAccountId", selected);
    FINORA_AUTH.setSelectedAccount(selected);
    document.getElementById("account-retain-modal").style.display = "none";
    location.reload();
  };

  // ✅ Google 登入
  document.getElementById("login-btn").addEventListener("click", async () => {
if (isFreeUser() && localStorage.getItem("devMode") !== "yes") {
  alert("您的免費試用已到期。您可使用本機帳本。也可升級版本繼續享受 Google 登入、三本帳本管理、匯率與股價同步功能喔。");
  return;
}
    try {
      const user = await FINORA_AUTH.signInWithGoogle();
      if (user) {
        alert(i18n("login_success"));
        location.reload();
      }
    } catch (e) {
      console.error("登入失敗", e);
      alert(i18n("login_failed"));
    }
  });

  // ✅ Google 登出
  document.getElementById("logout-btn").addEventListener("click", async () => {
    await FINORA_AUTH.signOutFromGoogle();
    alert(i18n("logout_success"));
    location.reload();
  });

  // ✅ 重新命名帳本
  document.getElementById("rename-account-btn").addEventListener("click", async () => {
    const newName = prompt(i18n("rename_prompt"), "");
    if (newName) {
      await FINORA_AUTH.renameAccount(newName);
      alert(i18n("rename_success"));
      location.reload();
    }
  });

  // ✅ 新增帳本
  document.getElementById("new-account-btn").addEventListener("click", () => {
    if (isFreeUser()) {
      alert(i18n("expired_add_account"));
      return;
    }
    document.getElementById("new-account-input-group").style.display = "block";
  });

  document.getElementById("save-new-account").addEventListener("click", async () => {
    const name = document.getElementById("new-account-name").value.trim();
    if (!name) return alert(i18n("account_name_required"));
    await FINORA_AUTH.addAccount(name);
    alert(i18n("add_success"));
    location.reload();
  });

  // ✅ 刪除帳本
  document.getElementById("delete-account-btn").addEventListener("click", async () => {
    if (confirm(i18n("confirm_delete"))) {
      await FINORA_AUTH.deleteAccount();
      alert(i18n("delete_success"));
      location.reload();
    }
  });

  // ✅ 登入狀態變化監聽
  FINORA_AUTH.onUserChanged(async (user) => {
    const loginBtn = document.getElementById("login-btn");
    const logoutBtn = document.getElementById("logout-btn");
    loginBtn.style.display = user ? "none" : "inline-block";
    logoutBtn.style.display = user ? "inline-block" : "none";

    const accountSelect = document.getElementById("account-select");
    accountSelect.innerHTML = "";

    if (user && (!isFreeUser() || localStorage.getItem("devMode") === "yes")) {
      const accounts = await FINORA_AUTH.fetchAccountList();
      const retainedId = localStorage.getItem("retainedAccountId");
      if (!retainedId && accounts.length > 1) {
        showAccountRetentionModal(accounts);
        return;
      }
      if (retainedId) {
        FINORA_AUTH.setSelectedAccount(retainedId);
      }
      accounts.forEach(acc => {
        const opt = document.createElement("option");
        opt.value = acc.id;
        opt.textContent = acc.displayName || acc.id;
        accountSelect.appendChild(opt);
      });
      const selected = FINORA_AUTH.getCurrentAccount();
      if (selected) accountSelect.value = selected;
      accountSelect.onchange = (e) => {
        FINORA_AUTH.setSelectedAccount(e.target.value);
        location.reload();
      };
    } else {
      // ✅ 本機帳本模式
      const localAccountId = localStorage.getItem("selectedAccount") || "default";
      const localOption = document.createElement("option");
      localOption.value = localAccountId;
      localOption.textContent = localAccountId;
      accountSelect.appendChild(localOption);
      accountSelect.value = localAccountId;
      FINORA_AUTH.setSelectedAccount(localAccountId);
      accountSelect.disabled = true;
    }
  });
});
</script>
</body>
</html>
