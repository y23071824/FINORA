  <style>
:root {
  --main-color: #b4695d;
  --main-color-hover: #944647;
  --main-color-bg: #f5e8e6;
  --button-radius: 20px;
  --button-font: 1.1rem;
  --button-border: 2px solid var(--main-color);
  --container-width: 700px;
}

body {
  margin: 0;
  font-family: "Noto Sans", sans-serif;
  background-color: white;
  color: #333;
}

/* ✅ 調整為靠上置中設計 */
body.logo-full-bg {
  display: flex;
  justify-content: center; /* 水平置中主內容 */
  min-height: 100vh;
  padding-top: 3rem;       /* ✅ 與上方保留空間 */
  box-sizing: border-box;
}

/* ✅ 主內容外框 */
.main-wrapper {
  width: 100%;
  max-width: 640px;
  margin-left: auto;
  margin-right: auto;
  padding: 0 1rem 3rem;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ✅ 標題與副標題 */
h1 {
  text-align: center;
  color: var(--main-color);
  font-size: 1.8rem;
  margin-bottom: 0.5rem;
}
.subtitle {
  text-align: center;
  font-size: 1rem;
  color: #555;
  margin-bottom: 2rem;
}

/* ✅ 主按鈕群組 */
.grid-button-group {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 1rem;
  margin-bottom: 1.5rem;
  width: 100%;
}
.grid-button-group a,
.grid-button-group button {
  aspect-ratio: 1 / 1;
  font-size: clamp(1rem, 4vw, 1.2rem);
  text-align: center;
  display: flex;
  align-items: center;
  justify-content: center;
  border: var(--button-border);
  border-radius: 24px;
  color: var(--main-color);
  font-weight: bold;
  text-decoration: none;
  background-color: white;
  cursor: pointer;
  word-break: break-word;
}
.grid-button-group a:hover,
.grid-button-group button:hover {
  background-color: #fcecec;
  color: #a94456;
}

/* ✅ 品牌故事按鈕為長方形 */
.grid-button-single {
  display: flex;
  justify-content: center;
  padding: 0 1rem;
  max-width: 500px;
  margin: 0 auto 1.5rem;
}
.grid-button-single a {
  padding: 1rem;
  font-size: 1rem;
  border: 2px solid var(--main-color);
  border-radius: 24px;
  color: var(--main-color);
  font-weight: bold;
  text-decoration: none;
  background-color: white;
  cursor: pointer;
  width: 90%;
  max-width: 400px;
  text-align: center;
}

/* ✅ 帳本管理區塊 */
.account-wrapper {
  text-align: center;
  margin-bottom: 2rem;
}
.account-controls {
  display: flex;
  justify-content: center;
  gap: 0.75rem;
  margin-top: 1rem;
}
.account-controls button {
  flex: 1;
  min-width: 60px;
  padding: 0.8rem;
  font-size: 1.1rem;
  border: 2px solid var(--main-color);
  border-radius: 16px;

  <div class="grid-button-group">
    <a href="assets.html" data-i18n="asset">資產管理</a>
    <a href="tools/compound.html" data-i18n="compound">複利試算</a>
    <a href="tools/withdraw.html" data-i18n="withdraw">退休提領</a>
    <a href="tools/emergency.html" data-i18n="emergency">預備金試算</a>
  </div>

  <div class="grid-button-single">
    <a href="about.html" data-i18n="nav_about">品牌故事</a>
  </div>

  <div class="account-wrapper">
    <label for="account-select" data-i18n="accountLabel">帳本選擇：</label>
    <select id="account-select" style="margin-top: 0.5rem; width: 90%; max-width: 320px;"></select>

    <div class="account-controls">
      <button id="rename-account-btn" data-i18n="rename">✏️</button>
      <button id="new-account-btn" data-i18n="add">➕</button>
      <button id="delete-account-btn" data-i18n="delete">🗑️</button>
    </div>

    <div id="new-account-input-group" style="display: none; margin-top: 1rem;">
      <input type="text" id="new-account-name" placeholder="輸入新帳本名稱" data-i18n-placeholder="placeholderNewAccount" />
      <button id="save-new-account" data-i18n="save">儲存</button>
    </div>
  </div>

  <div id="firebase-auth">
    <button id="login-btn" data-i18n="login">🔐 使用 Google 帳號登入</button>
    <button id="logout-btn" data-i18n="logout" style="display:none;">🚪 登出</button>
  </div>

  <div class="lang-selector">
    <label for="lang-select" data-i18n="langLabel">🌐 Language / 語言：</label>
    <select id="lang-select">
      <option value="zh-Hant">繁體中文</option>
      <option value="zh-Hans">简体中文</option>
      <option value="en">English</option>
      <option value="ja">日本語</option>

  <!-- Firebase + FINORA Script -->  
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="firebase-sync.js"></script>
<script src="lang.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", async () => {
    const lang = localStorage.getItem("lang") || "zh-Hant";
    if (typeof applyLang === "function") applyLang(lang);

    const langSelect = document.getElementById("lang-select");
    langSelect.value = lang;
    langSelect.addEventListener("change", function () {
      localStorage.setItem("lang", this.value);
      location.reload();
    });

    // 登入功能
    document.getElementById("login-btn").addEventListener("click", async () => {
      try {
        const user = await FINORA_AUTH.signInWithGoogle();
        if (user) {
          alert(i18n("login_success"));
          location.reload();
        }
      } catch (e) {
        console.error("登入失敗", e);
        alert(i18n("login_failed"));
      }
    });

    // 登出功能
    document.getElementById("logout-btn").addEventListener("click", async () => {
      await FINORA_AUTH.signOutFromGoogle();
      alert(i18n("logout_success"));
      location.reload();
    });

    // 重新命名帳本
    document.getElementById("rename-account-btn").addEventListener("click", async () => {
      const newName = prompt(i18n("rename_prompt"), "");
      if (newName) {
        await FINORA_AUTH.renameAccount(newName);
        alert(i18n("rename_success"));
        location.reload();
      }
    });

    // 顯示新增帳本欄位
    document.getElementById("new-account-btn").addEventListener("click", () => {
      document.getElementById("new-account-input-group").style.display = "block";
    });

    // 儲存新帳本
    document.getElementById("save-new-account").addEventListener("click", async () => {
      const name = document.getElementById("new-account-name").value.trim();
      if (!name) return alert(i18n("account_name_required"));
      await FINORA_AUTH.addAccount(name);
      alert(i18n("add_success"));
      location.reload();
    });

    // 刪除帳本
    document.getElementById("delete-account-btn").addEventListener("click", async () => {
      if (confirm(i18n("confirm_delete"))) {
        await FINORA_AUTH.deleteAccount();
        alert(i18n("delete_success"));
        location.reload();
      }
    });

    // 監聽登入狀態變化
    FINORA_AUTH.onUserChanged(async (user) => {
      const loginBtn = document.getElementById("login-btn");
      const logoutBtn = document.getElementById("logout-btn");
      loginBtn.style.display = user ? "none" : "inline-block";
      logoutBtn.style.display = user ? "inline-block" : "none";

      if (user) {
        const accountSelect = document.getElementById("account-select");
        const accounts = await FINORA_AUTH.fetchAccountList();
        accountSelect.innerHTML = "";
        accounts.forEach(acc => {
          const opt = document.createElement("option");
          opt.value = acc.id;
          opt.textContent = acc.displayName || acc.id;
          accountSelect.appendChild(opt);
        });

        const selected = FINORA_AUTH.getCurrentAccount();
        if (selected) accountSelect.value = selected;

        accountSelect.onchange = (e) => {
          FINORA_AUTH.setSelectedAccount(e.target.value);
          location.reload();
        };
      }
    });
  });
</script>
