<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>FINORA 好好存</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="favicon.png" type="image/png" />
  <link rel="stylesheet" href="style.css" />
  <script src="lang.js"></script>
</head>
<body class="logo-full-bg">
  <h1 id="title">FINORA 好好存</h1>
  <p class="subtitle" id="subtitle">讓資產更有力，退休不焦慮。</p>

  <div class="grid-button-group">
    <a href="assets.html" id="btn-assets">資產管理</a>
    <a href="tools/compound.html" id="btn-compound">複利試算</a>
    <a href="tools/withdraw.html" id="btn-withdraw">退休提領</a>
    <a href="tools/emergency.html" id="btn-emergency">預備金試算</a>
  </div>

  <div id="account-control-wrapper" style="margin-top: 2rem;">
    <label for="account-select" id="label-book">帳本選擇：</label>
    <select id="account-select" style="width: 100%; margin-bottom: 0.5rem;"></select>
    <div style="display: flex; justify-content: center; gap: 1rem;">
      <button id="rename-account-btn">✏️</button>
      <button id="new-account-btn">➕</button>
      <button id="delete-account-btn">🗑️</button>
    </div>
    <div id="new-account-input-group" style="display: none; margin-top: 0.5rem;">
      <input type="text" id="new-account-name" placeholder="輸入新帳本名稱" />
      <button id="save-new-account">儲存</button>
    </div>
  </div>

  <div id="firebase-auth" style="margin-top: 1.5rem; text-align: center;">
    <button id="login-btn">🔐 使用 Google 帳號登入</button>
    <button id="logout-btn" style="display:none;">🚪 登出</button>
  </div>

  <p class="privacy-note" id="privacy-note">FINORA 重視隱私。你的資產，只屬於你自己。</p>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="firebase-sync.js"></script>

  <script>
    const lang = localStorage.getItem('lang') || 'zh-Hant';
    const text = LANG_TEXT[lang] || LANG_TEXT['zh-Hant'];

    // 同步更新 HTML 語言屬性
    document.documentElement.lang = lang;

    // ✅ 套用語系文字
    document.getElementById("title").textContent = text.title;
    document.getElementById("subtitle").textContent = text.subtitle;
    document.getElementById("btn-assets").textContent = text.assets;
    document.getElementById("btn-compound").textContent = text.compound;
    document.getElementById("btn-withdraw").textContent = text.withdraw;
    document.getElementById("btn-emergency").textContent = text.emergency;
    document.getElementById("label-book").textContent = text.book + "：";
    document.getElementById("login-btn").textContent = text.login;
    document.getElementById("logout-btn").textContent = text.logout;
    document.getElementById("privacy-note").textContent = text.note;
  </script>

  <p style="text-align:center; font-size:0.8rem; color:#aaa; margin-top:3rem;">
    v0.9 beta - 2025-05-29
  </p>

  <footer class="site-footer">
    <p>© 2025 FINORA 好好存｜家庭友善資產整合工具</p>
    <div class="footer-links">
      <a href="howto.html">使用說明</a>・
      <a href="mailto:service@finora.life?subject=聯絡詢問">聯絡我們</a>・
      <a href="privacy.html">隱私權條款</a>
    </div>
  </footer>
</body>
</html>
