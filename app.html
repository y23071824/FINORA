    <style>    
  :root {    
  --main-color: #b4695d;    
  --main-color-hover: #944647;    
  --main-color-bg: #f5e8e6;    
  --button-radius: 20px;

}  body {  
margin: 0;  
font-family: "Noto Sans", sans-serif;

}  /* ✅ 標題與副標題 */

/* ✅ 主按鈕群組 */

grid-template-columns: repeat(2, 1fr);

border-radius: 24px;

cursor: pointer;
word-break: break-word;
}
.grid-button-group a:hover,

color: #a94456;
}

/* ✅ 品牌故事按鈕為長方形 */
.grid-button-single {
margin-bottom: 2rem;
}
.grid-button-single a {
padding: 1rem;
font-size: 1rem;
border: 2px solid var(--main-color);
border-radius: 24px;
color: var(--main-color);
font-weight: bold;
text-decoration: none;
background-color: white;
cursor: pointer;
width: 90%;
max-width: 400px;
text-align: center;
}

/* ✅ 全域按鈕設定 */
button,
.grid-button-group a,
.cta-full,
.action-button {
font-size: 1rem;
border: 2px solid var(--main-color);
border-radius: 24px;
color: var(--main-color);
font-weight: bold;
text-decoration: none;
background-color: white;
cursor: pointer;
width: 90%;
max-width: 400px;
text-align: center;
padding: 0.8rem 1rem;
box-sizing: border-box;
}

/* ✅ 帳本管理區塊 */
.account-wrapper {
text-align: center;
margin-bottom: 2rem;
}
.account-controls {
display: flex;
justify-content: center;
gap: 0.75rem;
margin-top: 1rem;
}
.account-controls button {
flex: 1;
min-width: 60px;
padding: 0.8rem;
font-size: 1.1rem;
border: 2px solid var(--main-color);
border-radius: 16px;
background-color: white;
color: var(--main-color);
font-weight: bold;
text-align: center;
}

/* ✅ 登入/登出按鈕 */
#firebase-auth {
text-align: center;
margin-top: 1.5rem;
}

/* ✅ 語言切換 */
.lang-selector {
text-align: center;
margin-top: 1.5rem;
}

/* ✅ 說明與頁尾 */
.privacy-note {
text-align: center;
font-size: 0.85rem;
color: #777;
margin-top: 2rem;
}
footer {
text-align: center;
font-size: 0.85rem;
color: #999;
padding: 1rem;
}
.footer-links a {
margin: 0 0.25rem;
color: #999;
text-decoration: none;
}

/* ✅ 浮水印背景 */
body.logo-full-bg::before {
content: "";
position: fixed;
top: 0;
left: 0;
width: 100vw;
height: 100vh;
background-image: url('favicon.png');
background-repeat: no-repeat;
background-position: center 20%;
background-size: 60%;
opacity: 0.08;
pointer-events: none;
z-index: 0;
}

/* ✅ 主要容器 /
body.logo-full-bg {
padding: 0 !important;
max-width: 100% !important;
}
.main-wrapper {
width: 100%;
max-width: 640px;  / 從 480 擴大 */
margin-left: auto;
margin-right: auto;
padding: 0 1rem;
box-sizing: border-box;
}

/* ✅ 按鈕群組（正方形兩列置中） */
.grid-button-group {
display: grid;
grid-template-columns: repeat(2, 1fr);
gap: 1.2rem;
width: 100%;
max-width: 500px;
margin: 0 auto 2rem;
justify-items: center;
justify-content: center
}
.grid-button-group a {
aspect-ratio: 1 / 1;
width: 100%;
max-width: 200px;
font-size: 1.2rem;
}

/* ✅ 單列置中按鈕區塊 */
.grid-button-single {
display: flex;
justify-content: center;
padding: 0 1rem;
max-width: 500px;
margin: 0 auto 1.5rem;
}

  </style>    
</head>

<body class="logo-full-bg">
  <div class="main-wrapper">
    <h1 data-i18n="title">FINORA 好好存</h1>
    <p class="subtitle" data-i18n="subtitle">讓資產更有力，退休不焦慮。</p>

    <div class="grid-button-group">
      <a href="assets.html" data-i18n="asset">資產管理</a>
      <a href="tools/compound.html" data-i18n="compound">複利試算</a>
      <a href="tools/withdraw.html" data-i18n="withdraw">退休提領</a>
      <a href="tools/emergency.html" data-i18n="emergency">預備金試算</a>

    <div class="grid-button-single">
      <a href="about.html" data-i18n="nav_about">品牌故事</a>
    </div>

    <div class="account-wrapper">
      <label for="account-select" data-i18n="accountLabel">帳本選擇：</label>
      <select id="account-select" style="margin-top: 0.5rem; width: 90%; max-width: 320px;"></select>
      <div class="account-controls">
        <button id="rename-account-btn" data-i18n="rename">✏️</button>
        <button id="new-account-btn" data-i18n="add">➕</button>
        <button id="delete-account-btn" data-i18n="delete">🗑️</button>
      </div>
      <div id="new-account-input-group" style="display: none; margin-top: 1rem;">
        <input type="text" id="new-account-name" placeholder="輸入新帳本名稱" data-i18n-placeholder="placeholderNewAccount" />
        <button id="save-new-account" data-i18n="save">儲存</button>
      </div>
    </div>

    <div id="firebase-auth">
      <button id="login-btn" data-i18n="login">🔐 使用 Google 帳號登入</button>

    </div>

    <div class="lang-selector">
      <label for="lang-select" data-i18n="langLabel">🌐 Language / 語言：</label>
      <select id="lang-select">
        <option value="zh-Hant">繁體中文</option>

        <a href="howto.html" data-i18n="guide">使用說明</a>・
        <a href="mailto:service@finora.life?subject=聯絡詢問" data-i18n="contact">聯絡我們</a>・
        <a href="privacy.html" data-i18n="policy">隱私權條款</a>
      </div>
    </footer>
  </div>

  <!-- 🌟 升級提示與帳本保留 Modal -->
  <div id="upgrade-modal" style="display:none;"></div>
  <div id="account-retain-modal" style="display:none;"></div>

  <!-- Firebase SDK 與腳本 -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="firebase-sync.js"></script>
  <script src="lang.js"></script>
  <script src="main-script.js"></script> <!-- ✅ 你整合的登入/帳本/試用期邏輯放這 -->
  <script>
document.addEventListener("DOMContentLoaded", async () => {
  const lang = localStorage.getItem("lang") || "zh-Hant";
  if (typeof applyLang === "function") applyLang(lang);

  const langSelect = document.getElementById("lang-select");
  langSelect.value = lang;
  langSelect.addEventListener("change", function () {
    localStorage.setItem("lang", this.value);
    location.reload();
  });

  function isFreeUser() {
    if (localStorage.getItem("devMode") === "yes") return false;
    const createdAt = localStorage.getItem("userCreatedAt");
    if (!createdAt) return true;
    const daysUsed = (Date.now() - parseInt(createdAt, 10)) / (1000 * 60 * 60 * 24);
    return daysUsed > 30;
  }

  if (!localStorage.getItem("userCreatedAt")) {
    localStorage.setItem("userCreatedAt", Date.now().toString());
  }

  function showAccountRetentionModal(accounts) {
    const select = document.getElementById("retain-select");
    select.innerHTML = "";
    accounts.forEach(acc => {
      const opt = document.createElement("option");
      opt.value = acc.id;
      opt.textContent = acc.displayName || acc.id;
      select.appendChild(opt);
    });
    document.getElementById("account-retain-modal").style.display = "flex";
  }

  window.confirmAccountRetention = function () {
    const selected = document.getElementById("retain-select").value;
    localStorage.setItem("retainedAccountId", selected);
    FINORA_AUTH.setSelectedAccount(selected);
    document.getElementById("account-retain-modal").style.display = "none";
    location.reload();
  };

  document.getElementById("login-btn").addEventListener("click", async () => {
    if (isFreeUser()) {
      const modal = document.getElementById("upgrade-modal");
      if (modal) modal.style.display = "flex";
      return;
    }
    try {
      const user = await FINORA_AUTH.signInWithGoogle();
      if (user) {
        alert("登入成功！");
        location.reload();
      }
    } catch (e) {
      console.error("登入失敗", e);
      alert("登入失敗，請稍後再試");
    }
  });

  document.getElementById("logout-btn").addEventListener("click", async () => {
    await FINORA_AUTH.signOutFromGoogle();
    alert("登出成功！");
    location.reload();
  });

  document.getElementById("rename-account-btn").addEventListener("click", async () => {
    const newName = prompt("輸入新帳本名稱：", "");
    if (newName) {
      await FINORA_AUTH.setAccountDisplayName(FINORA_AUTH.getCurrentAccount(), newName);
      alert("帳本已重新命名！");
      location.reload();
    }
  });

  document.getElementById("new-account-btn").addEventListener("click", () => {
    const accounts = JSON.parse(localStorage.getItem("accounts") || "[]");
    if (isFreeUser() && accounts.length > 1) {
      const modal = document.getElementById("upgrade-modal");
      if (modal) modal.style.display = "flex";
      return;
    }
    document.getElementById("new-account-input-group").style.display = "block";
  });

  document.getElementById("save-new-account").addEventListener("click", async () => {
    const name = document.getElementById("new-account-name").value.trim();
    if (!name) return alert("請輸入帳本名稱");
    await FINORA_AUTH.createNewAccount(name);
    alert("新增成功！");
    location.reload();
  });

  document.getElementById("delete-account-btn").addEventListener("click", async () => {
    if (confirm("確定要刪除目前帳本？")) {
      await FINORA_AUTH.deleteAccount(FINORA_AUTH.getCurrentAccount());
      alert("刪除成功！");
      location.reload();
    }
  });

  FINORA_AUTH.onUserChanged(async (user) => {
    const loginBtn = document.getElementById("login-btn");
    const logoutBtn = document.getElementById("logout-btn");
    loginBtn.style.display = user ? "none" : "inline-block";
    logoutBtn.style.display = user ? "inline-block" : "none";

    if (user) {
      const accountSelect = document.getElementById("account-select");
      const accounts = await FINORA_AUTH.fetchAccountList();
      accountSelect.innerHTML = "";

      if (isFreeUser() && accounts.length > 1) {
        const retainedId = localStorage.getItem("retainedAccountId");
        if (!retainedId) {
          showAccountRetentionModal(accounts);
          return;
        }

        FINORA_AUTH.setSelectedAccount(retainedId);
        document.getElementById("account-select").disabled = true;
        document.getElementById("new-account-btn").disabled = true;
        document.getElementById("delete-account-btn").disabled = true;
      }

      accounts.forEach(acc => {
        const opt = document.createElement("option");
        opt.value = acc.id;
        opt.textContent = acc.displayName || acc.id;
        accountSelect.appendChild(opt);
      });

      const selected = FINORA_AUTH.getCurrentAccount();
      if (selected) accountSelect.value = selected;

      accountSelect.onchange = (e) => {
        FINORA_AUTH.setSelectedAccount(e.target.value);
        location.reload();
      };
      // ✅ 若無登入且試用已過，自動啟用本機帳本
if (isFreeUser() && !firebase.auth().currentUser) {
  const accountSelect = document.getElementById("account-select");
  const localId = "local-default";
  localStorage.setItem("selectedAccount", localId);
  accountSelect.innerHTML = "";
  const opt = document.createElement("option");
  opt.value = localId;
  opt.textContent = "本機帳本";
  accountSelect.appendChild(opt);
  accountSelect.disabled = true;

  // 隱藏新增與刪除功能
  document.getElementById("new-account-btn").style.display = "none";
  document.getElementById("delete-account-btn").style.display = "none";
  document.getElementById("rename-account-btn").style.display = "none";

  // 停用匯率與股價更新（如果你後面有這些功能）
  console.log("已進入免費模式：使用本機帳本");
}
    }
  });
});
  </script>
</body>
</html>
